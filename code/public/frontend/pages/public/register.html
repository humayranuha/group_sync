<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - GroupSync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .animate-spin { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">
    <div class="flex w-full max-w-6xl">
        <!-- Left Side -->
        <div class="hidden lg:flex lg:w-1/2 bg-blue-600 rounded-l-2xl items-center justify-center p-12">
            <div class="text-center text-white">
                <div class="text-6xl mb-6">🚀</div>
                <h1 class="text-4xl font-bold mb-4">Join GroupSync</h1>
                <p class="text-xl mb-6">Start your academic collaboration journey</p>
                <p class="text-blue-100">Create an account to access powerful analytics and AI insights</p>
            </div>
        </div>
        
        <!-- Right Side -->
        <div class="w-full lg:w-1/2 bg-white rounded-r-2xl shadow-2xl p-8 lg:p-12">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold text-gray-900">Create Account</h2>
                <p class="text-gray-600 mt-2">Join GroupSync today</p>
            </div>
            
            <form id="registerForm" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">First Name</label>
                        <input type="text" id="firstName" placeholder="John" required
                               class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Last Name</label>
                        <input type="text" id="lastName" placeholder="Doe" required
                               class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700">Email Address</label>
                    <input type="email" id="email" placeholder="student@university.edu" required
                           class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700">I am a...</label>
                    <select id="role" class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="student">Student</option>
                        <option value="professor">Professor</option>
                    </select>
                </div>
                
                <div id="departmentField" style="display: none;">
                    <label class="block text-sm font-medium text-gray-700">Department</label>
                    <input type="text" id="department" placeholder="e.g., Computer Science"
                           class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required
                           class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <p class="mt-1 text-xs text-gray-500">Must be at least 6 characters</p>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="••••••••" required
                           class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                
                <button type="submit" id="registerBtn"
                        class="w-full py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-medium text-lg">
                    Create Account
                </button>
            </form>
            
            <p class="mt-6 text-center text-sm text-gray-600">
                Already have an account? <a href="/login.html" class="text-blue-600 hover:text-blue-500 font-medium">Sign in</a>
            </p>
        </div>
    </div>

    <script>
        const form = document.getElementById('registerForm');
        const btn = document.getElementById('registerBtn');
        const roleSelect = document.getElementById('role');
        const departmentField = document.getElementById('departmentField');

        // Show/hide department field based on role
        roleSelect.addEventListener('change', function() {
            if (this.value === 'professor') {
                departmentField.style.display = 'block';
            } else {
                departmentField.style.display = 'none';
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const role = roleSelect.value;
            const department = document.getElementById('department').value.trim();

            if (!firstName || !lastName || !email || !password) {
                alert('Please fill all required fields');
                return;
            }

            if (password !== confirmPassword) {
                alert('Passwords do not match');
                return;
            }

            if (password.length < 6) {
                alert('Password must be at least 6 characters');
                return;
            }

            const userData = {
                first_name: firstName,
                last_name: lastName,
                email: email,
                password: password,
                role: role,
                department: role === 'professor' ? department : null
            };

            btn.textContent = 'Creating account...';
            btn.disabled = true;

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('Registration successful! Please login.');
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 1000);
                } else {
                    const errors = data.errors ? Object.values(data.errors).flat().join(', ') : data.message || 'Registration failed';
                    alert(errors);
                }
            } catch (error) {
                alert('Network error. Please try again.');
            } finally {
                btn.textContent = 'Create Account';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
