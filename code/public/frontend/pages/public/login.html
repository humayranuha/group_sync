<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GroupSync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .animate-spin { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center">
    <div class="flex w-full max-w-6xl">
        <!-- Left Side -->
        <div class="hidden lg:flex lg:w-1/2 bg-blue-600 rounded-l-2xl items-center justify-center p-12">
            <div class="text-center text-white">
                <div class="text-6xl mb-6">📊</div>
                <h1 class="text-4xl font-bold mb-4">GroupSync</h1>
                <p class="text-xl mb-6">AI-Powered Academic Collaboration Analytics</p>
                <p class="text-blue-100">Monitor student contributions, detect free riders, and enhance group collaboration</p>
            </div>
        </div>
        
        <!-- Right Side -->
        <div class="w-full lg:w-1/2 bg-white rounded-r-2xl shadow-2xl p-8 lg:p-12">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold text-gray-900">Welcome Back</h2>
                <p class="text-gray-600 mt-2">Sign in to your account</p>
            </div>
            
            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Email Address</label>
                    <input type="email" id="email" placeholder="student@demo.com" required
                           class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required
                           class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>
                
                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input type="checkbox" id="remember" class="h-4 w-4 text-blue-600 rounded border-gray-300">
                        <label for="remember" class="ml-2 text-sm text-gray-700">Remember me</label>
                    </div>
                    <a href="#" class="text-sm text-blue-600 hover:text-blue-500">Forgot password?</a>
                </div>
                
                <button type="submit" id="loginBtn"
                        class="w-full py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-medium text-lg">
                    Sign In
                </button>
            </form>
            
            <div class="mt-6">
                <div class="relative">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-300"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-4 bg-white text-gray-500">Or continue with</span>
                    </div>
                </div>
                
                <button id="githubLogin" class="mt-6 w-full flex justify-center items-center py-3 border border-gray-300 rounded-lg hover:bg-gray-50 transition">
                    <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M10 0C4.477 0 0 4.477 0 10c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.03-2.682-.103-.253-.447-1.27.098-2.646 0 0 .84-.269 2.75 1.025.8-.223 1.65-.334 2.5-.334.85 0 1.7.111 2.5.334 1.91-1.294 2.75-1.025 2.75-1.025.545 1.376.201 2.393.099 2.646.64.698 1.03 1.591 1.03 2.682 0 3.841-2.337 4.687-4.565 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C17.14 18.163 20 14.418 20 10c0-5.523-4.477-10-10-10z"/>
                    </svg>
                    Sign in with GitHub
                </button>
            </div>
            
            <p class="mt-6 text-center text-sm text-gray-600">
                Don't have an account? <a href="/register.html" class="text-blue-600 hover:text-blue-500 font-medium">Sign up</a>
            </p>
            <p class="mt-2 text-center text-xs text-gray-400">
                Demo: student@demo.com / 123456
            </p>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const btn = document.getElementById('loginBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                alert('Please fill all fields');
                return;
            }

            btn.textContent = 'Signing in...';
            btn.disabled = true;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('groupsync_auth_token', data.token);
                    localStorage.setItem('groupsync_user_data', JSON.stringify(data.user));
                    alert('Login successful!');
                    setTimeout(() => {
                        window.location.href = data.redirect || '/student/dashboard.html';
                    }, 500);
                } else {
                    alert(data.message || 'Login failed');
                }
            } catch (error) {
                alert('Network error. Please try again.');
            } finally {
                btn.textContent = 'Sign In';
                btn.disabled = false;
            }
        });

        document.getElementById('githubLogin')?.addEventListener('click', () => {
            alert('GitHub OAuth coming soon!');
        });
    </script>
</body>
</html>
