<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peer Reviews - GroupSync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .sidebar-transition { transition: transform 0.3s ease-in-out; }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        .nav-link.active { background-color: #eff6ff; color: #1d4ed8; }
        .animate-spin { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .peer-rating {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(58,175,169,0.15);
            transition: all 0.3s ease;
            color: #1f2937;
            padding: 0.5rem 0.75rem;
            border-radius: 8px;
            width: 100%;
        }
        .peer-rating:focus {
            border-color: #3AAFA9;
            box-shadow: 0 0 0 3px rgba(58,175,169,0.15);
            outline: none;
        }
        .dark .peer-rating {
            background: rgba(0,0,0,0.2);
            color: #e2e8f0;
        }
        .peer-comment {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(58,175,169,0.15);
            transition: all 0.3s ease;
            color: #1f2937;
            padding: 0.5rem 0.75rem;
            border-radius: 8px;
            width: 100%;
            resize: vertical;
            min-height: 60px;
        }
        .peer-comment:focus {
            border-color: #3AAFA9;
            box-shadow: 0 0 0 3px rgba(58,175,169,0.15);
            outline: none;
        }
        .dark .peer-comment {
            background: rgba(0,0,0,0.2);
            color: #e2e8f0;
        }
        .dark .bg-white { background-color: #132424 !important; }
        .dark .bg-gray-50 { background-color: #0b1717 !important; }
        .dark .text-gray-600, .dark .text-gray-700 { color: #cbd5e1 !important; }
        .dark .text-gray-500 { color: #94a3b8 !important; }
        .dark .border-gray-200 { border-color: #1e3a3a !important; }
        .dark .bg-yellow-50 { background-color: rgba(58,175,169,0.08) !important; }
        .dark .bg-green-100 { background-color: rgba(58,175,169,0.12) !important; }
        .dark .text-green-800 { color: #7ccfca !important; }
        .dark .text-yellow-800 { color: #7ccfca !important; }
        .dark .text-blue-600 { color: #5ccbc5 !important; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="student-dashboard">
        <!-- Sidebar -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-white shadow-lg transform -translate-x-full md:translate-x-0 transition-transform duration-300 z-30">
            <div class="h-16 bg-gradient-to-r from-blue-600 to-blue-700 flex items-center justify-center">
                <h1 class="text-xl font-bold text-white">GroupSync</h1>
                <span class="ml-2 text-xs text-blue-200">Student</span>
            </div>
            <nav class="p-4 space-y-1">
                <a href="/student/dashboard.html" data-page="dashboard" class="nav-link flex items-center px-3 py-2 rounded-lg hover:bg-gray-100">
                    <span class="text-xl mr-3">📊</span><span>Dashboard</span>
                </a>
                <a href="/student/group-details.html" data-page="group" class="nav-link flex items-center px-3 py-2 rounded-lg hover:bg-gray-100">
                    <span class="text-xl mr-3">👥</span><span>My Group</span>
                </a>
                <a href="/student/repository-connection.html" data-page="repository" class="nav-link flex items-center px-3 py-2 rounded-lg hover:bg-gray-100">
                    <span class="text-xl mr-3">🔗</span><span>GitHub Connection</span>
                </a>
                <a href="/student/contribution-analytics.html" data-page="analytics" class="nav-link flex items-center px-3 py-2 rounded-lg hover:bg-gray-100">
                    <span class="text-xl mr-3">📈</span><span>Analytics</span>
                </a>
                <a href="/student/peer-review.html" data-page="peer-review" class="nav-link active flex items-center px-3 py-2 rounded-lg hover:bg-gray-100">
                    <span class="text-xl mr-3">⭐</span><span>Peer Reviews</span>
                </a>
                <a href="/student/ai-feedback.html" data-page="ai-feedback" class="nav-link flex items-center px-3 py-2 rounded-lg hover:bg-gray-100">
                    <span class="text-xl mr-3">🤖</span><span>AI Feedback</span>
                </a>
            </nav>
            <div class="absolute bottom-0 w-full p-4 border-t bg-gray-50">
                <div class="flex items-center">
                    <div id="user-avatar" class="w-10 h-10 bg-gradient-to-r from-blue-400 to-blue-600 rounded-full flex items-center justify-center text-white font-semibold text-lg">ST</div>
                    <div class="ml-3 flex-1">
                        <p id="user-name" class="text-sm font-medium text-gray-800">Student</p>
                        <p class="text-xs text-gray-500">Student</p>
                    </div>
                    <button id="logoutBtn" class="p-2 text-red-500 hover:text-red-700 transition" title="Logout">🚪</button>
                </div>
            </div>
        </aside>

        <!-- Mobile Menu Button -->
        <button id="menuBtn" class="fixed top-4 left-4 z-40 md:hidden bg-blue-600 text-white p-2 rounded-lg shadow-lg">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
        </button>

        <!-- Main Content -->
        <main class="md:ml-64 p-6">
            <div id="page-content">
                <!-- Loading -->
                <div class="flex items-center justify-center h-64">
                    <div class="text-center">
                        <div class="animate-spin rounded-full h-12 w-12 border-2 border-[#3AAFA9] border-t-transparent mx-auto"></div>
                        <p class="text-gray-500 dark:text-gray-400 mt-4 text-sm">Loading peer reviews...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // ============================================
        // CONFIGURATION
        // ============================================
        const API_BASE = '/api';
        const STORAGE_KEYS = {
            TOKEN: 'groupsync_auth_token',
            USER: 'groupsync_user_data'
        };

        // ============================================
        // DEMO GROUP DATA
        // ============================================
        const DEMO_GROUP = {
            id: 1,
            name: 'Team Alpha',
            course_name: 'Software Engineering (CS401)',
            member_count: 4,
            members: [
                { id: 1, name: 'Arisha Ridha (You)', role: 'Student', commits: 45, contribution_percentage: 35, classification: 'Active' },
                { id: 2, name: 'John Doe', role: 'Student', commits: 32, contribution_percentage: 28, classification: 'Active' },
                { id: 3, name: 'Jane Smith', role: 'Student', commits: 18, contribution_percentage: 22, classification: 'Moderate' },
                { id: 4, name: 'Mike Brown', role: 'Student', commits: 8, contribution_percentage: 15, classification: 'Passive' }
            ]
        };

        // ============================================
        // TOAST SYSTEM
        // ============================================
        class ToastManager {
            constructor() { this.container = null;
                this.init(); }
            init() {
                this.container = document.createElement('div');
                this.container.className = 'fixed bottom-4 right-4 z-50 space-y-2 max-w-sm w-full';
                document.body.appendChild(this.container);
            }
            show(message, type = 'info', duration = 5000) {
                const toast = document.createElement('div');
                const colors = {
                    success: 'bg-[#3AAFA9]/10 border-[#3AAFA9] text-[#2B7A78]',
                    error: 'bg-red-50 border-red-400 text-red-800',
                    warning: 'bg-yellow-50 border-yellow-400 text-yellow-800',
                    info: 'bg-blue-50 border-blue-400 text-blue-800'
                };
                const icons = { success: '✓', error: '✕', warning: '⚠', info: 'ℹ' };
                toast.className =
                    `transform transition-all duration-300 translate-x-full opacity-0 border-l-4 rounded-xl shadow-xl p-4 mb-2 ${colors[type]} dark:bg-[#132424] dark:border-[#3AAFA9] dark:text-[#7ccfca]`;
                toast.innerHTML =
                    `<div class="flex items-center"><span class="text-lg font-bold mr-2">${icons[type]}</span><p class="text-sm font-medium">${message}</p><button class="ml-auto font-bold hover:opacity-70 transition">&times;</button></div>`;
                this.container.appendChild(toast);
                requestAnimationFrame(() => { toast.classList.remove('translate-x-full', 'opacity-0'); });
                toast.querySelector('button').onclick = () => toast.remove();
                setTimeout(() => { if (toast.parentNode) toast.remove(); }, duration);
                return toast;
            }
            success(m) { this.show(m, 'success'); }
            error(m) { this.show(m, 'error'); }
            warning(m) { this.show(m, 'warning'); }
            info(m) { this.show(m, 'info'); }
        }

        // ============================================
        // AUTH SERVICE
        // ============================================
        var AuthService = {
            getToken: function() { return localStorage.getItem(STORAGE_KEYS.TOKEN); },
            getUser: function() { var data = localStorage.getItem(STORAGE_KEYS.USER); return data ? JSON.parse(data) : null; },
            isAuthenticated: function() { return !!this.getToken(); },
            logout: function() {
                localStorage.removeItem(STORAGE_KEYS.TOKEN);
                localStorage.removeItem(STORAGE_KEYS.USER);
                window.location.href = '/login.html';
            }
        };

        // ============================================
        // HELPERS
        // ============================================
        function getInitials(name) {
            if (!name) return 'ST';
            return name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
        }

        function getClassificationClass(classification) {
            const map = { 'Active': 'bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-300',
                'Moderate': 'bg-yellow-100 text-yellow-800 dark:bg-yellow-900/30 dark:text-yellow-300',
                'Passive': 'bg-orange-100 text-orange-800 dark:bg-orange-900/30 dark:text-orange-300',
                'Free Rider': 'bg-red-100 text-red-800 dark:bg-red-900/30 dark:text-red-300'
            };
            return map[classification] || 'bg-gray-100 text-gray-600';
        }

        // ============================================
        // PEER REVIEW LOGIC
        // ============================================
        function loadGroupData() {
            return new Promise((resolve) => {
                setTimeout(() => {
                    resolve(DEMO_GROUP);
                }, 300);
            });
        }

        function renderPeerReviewPage() {
            const container = document.getElementById('page-content');

            loadGroupData().then(group => {
                if (!group || !group.members || group.members.length <= 1) {
                    container.innerHTML = `
                        <div class="space-y-6">
                            <h2 class="text-2xl font-bold text-gray-800 dark:text-gray-100">⭐ Peer Reviews</h2>
                            <div class="bg-white dark:bg-[#132424] rounded-lg shadow p-8 text-center">
                                <div class="text-6xl mb-4">👥</div>
                                <h3 class="text-xl font-semibold text-gray-800 dark:text-gray-100">No Team Members to Review</h3>
                                <p class="text-gray-500 dark:text-gray-400 mt-2">You need to be in a group with at least one other member to submit peer reviews.</p>
                            </div>
                        </div>
                    `;
                    return;
                }

                // Get members except current user (assume first is "You")
                const members = group.members.filter(m => !m.name.includes('(You)'));
                if (members.length === 0) {
                    container.innerHTML = `
                        <div class="space-y-6">
                            <h2 class="text-2xl font-bold text-gray-800 dark:text-gray-100">⭐ Peer Reviews</h2>
                            <div class="bg-white dark:bg-[#132424] rounded-lg shadow p-8 text-center">
                                <div class="text-6xl mb-4">👥</div>
                                <h3 class="text-xl font-semibold text-gray-800 dark:text-gray-100">No Other Members</h3>
                                <p class="text-gray-500 dark:text-gray-400 mt-2">You are the only member in your group.</p>
                            </div>
                        </div>
                    `;
                    return;
                }

                // Get submitted reviews from localStorage
                const submittedReviews = JSON.parse(localStorage.getItem('peer_reviews_submitted') || '{}');

                // Build review cards
                let reviewCards = members.map((member, index) => {
                    const isSubmitted = submittedReviews[member.id];
                    return `
                        <div class="bg-white dark:bg-[#132424] rounded-lg shadow p-6 border border-[#3AAFA9]/20" id="review-card-${member.id}">
                            <div class="flex items-center justify-between mb-4">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 rounded-full bg-gradient-to-r from-[#3AAFA9] to-[#2B7A78] flex items-center justify-center text-white font-semibold text-sm">
                                        ${getInitials(member.name)}
                                    </div>
                                    <div>
                                        <h4 class="font-semibold text-gray-800 dark:text-gray-100">${member.name}</h4>
                                        <p class="text-xs text-gray-500 dark:text-gray-400">${member.role || 'Team Member'}</p>
                                    </div>
                                </div>
                                <span class="text-xs text-gray-400">${member.commits || 0} commits</span>
                            </div>

                            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Communication</label>
                                    <select class="peer-rating w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#3AAFA9] dark:bg-[#132424] text-gray-800 dark:text-gray-200" data-member="${member.id}" ${isSubmitted ? 'disabled' : ''}>
                                        <option value="5">5 - Excellent</option>
                                        <option value="4" selected>4 - Good</option>
                                        <option value="3">3 - Average</option>
                                        <option value="2">2 - Below Average</option>
                                        <option value="1">1 - Poor</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Reliability</label>
                                    <select class="peer-rating w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#3AAFA9] dark:bg-[#132424] text-gray-800 dark:text-gray-200" data-member="${member.id}" ${isSubmitted ? 'disabled' : ''}>
                                        <option value="5">5 - Excellent</option>
                                        <option value="4" selected>4 - Good</option>
                                        <option value="3">3 - Average</option>
                                        <option value="2">2 - Below Average</option>
                                        <option value="1">1 - Poor</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Task Participation</label>
                                    <select class="peer-rating w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#3AAFA9] dark:bg-[#132424] text-gray-800 dark:text-gray-200" data-member="${member.id}" ${isSubmitted ? 'disabled' : ''}>
                                        <option value="5">5 - Excellent</option>
                                        <option value="4" selected>4 - Good</option>
                                        <option value="3">3 - Average</option>
                                        <option value="2">2 - Below Average</option>
                                        <option value="1">1 - Poor</option>
                                    </select>
                                </div>
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Comments (Optional)</label>
                                <textarea class="peer-comment w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#3AAFA9] dark:bg-[#132424] text-gray-800 dark:text-gray-200" rows="2" placeholder="Provide constructive feedback..." data-member="${member.id}" ${isSubmitted ? 'disabled' : ''}>${isSubmitted ? JSON.parse(localStorage.getItem('peer_reviews_data') || '{}')[member.id]?.comment || '' : ''}</textarea>
                            </div>

                            <div class="mt-3 flex items-center justify-between">
                                <span class="text-xs text-gray-400">Your review will be anonymous</span>
                                ${isSubmitted ? 
                                    `<span class="px-4 py-2 bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-300 rounded-lg text-sm">✅ Submitted</span>` :
                                    `<button class="submit-review-btn px-4 py-2 bg-[#3AAFA9] text-white rounded-lg hover:bg-[#2B7A78] text-sm transition" data-member="${member.id}" data-name="${member.name}">Submit Review</button>`
                                }
                            </div>
                            ${isSubmitted ? `<div class="review-status mt-2 text-sm text-green-600 dark:text-green-400">✅ Review submitted on ${new Date(JSON.parse(localStorage.getItem('peer_reviews_data') || '{}')[member.id]?.submitted_at).toLocaleDateString()}</div>` : `<div class="review-status mt-2 text-sm hidden"></div>`}
                        </div>
                    `;
                }).join('');

                container.innerHTML = `
                    <div class="space-y-6">
                        <div class="flex justify-between items-center">
                            <h2 class="text-2xl font-bold text-gray-800 dark:text-gray-100">⭐ Peer Reviews</h2>
                            <span class="text-sm text-gray-500 dark:text-gray-400">Deadline: ${new Date(Date.now() + 7*24*60*60*1000).toLocaleDateString()}</span>
                        </div>

                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                            <div class="bg-white dark:bg-[#132424] rounded-lg shadow p-4 text-center">
                                <p class="text-2xl font-bold text-[#3AAFA9]">${members.length}</p>
                                <p class="text-sm text-gray-500 dark:text-gray-400">Total Members</p>
                            </div>
                            <div class="bg-white dark:bg-[#132424] rounded-lg shadow p-4 text-center" id="reviewed-count">
                                <p class="text-2xl font-bold text-green-600 dark:text-green-400">${Object.keys(submittedReviews).length}</p>
                                <p class="text-sm text-gray-500 dark:text-gray-400">Reviewed</p>
                            </div>
                            <div class="bg-white dark:bg-[#132424] rounded-lg shadow p-4 text-center" id="pending-count">
                                <p class="text-2xl font-bold text-yellow-600 dark:text-yellow-400">${members.length - Object.keys(submittedReviews).length}</p>
                                <p class="text-sm text-gray-500 dark:text-gray-400">Pending</p>
                            </div>
                            <div class="bg-white dark:bg-[#132424] rounded-lg shadow p-4 text-center" id="completion-count">
                                <p class="text-2xl font-bold text-gray-800 dark:text-gray-100">${members.length > 0 ? Math.round((Object.keys(submittedReviews).length / members.length) * 100) : 0}%</p>
                                <p class="text-sm text-gray-500 dark:text-gray-400">Completion</p>
                            </div>
                        </div>

                        <div class="space-y-4">
                            ${reviewCards}
                        </div>
                    </div>
                `;

                // ---- Handle Submit Review ----
                document.querySelectorAll('.submit-review-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const memberId = parseInt(this.dataset.member);
                        const memberName = this.dataset.name;
                        const card = document.getElementById(`review-card-${memberId}`);
                        const ratingSelects = card.querySelectorAll('.peer-rating');
                        const comment = card.querySelector('.peer-comment').value.trim();
                        const statusDiv = card.querySelector('.review-status');

                        // Check if already submitted
                        const submitted = JSON.parse(localStorage.getItem('peer_reviews_submitted') || '{}');
                        if (submitted[memberId]) {
                            statusDiv.className = 'review-status mt-2 text-sm text-yellow-600 dark:text-yellow-400';
                            statusDiv.textContent = '⚠️ You have already reviewed this member.';
                            return;
                        }

                        const ratings = {
                            communication: parseInt(ratingSelects[0].value),
                            reliability: parseInt(ratingSelects[1].value),
                            task_participation: parseInt(ratingSelects[2].value)
                        };

                        // Validate
                        if (ratings.communication < 1 || ratings.reliability < 1 || ratings.task_participation < 1) {
                            statusDiv.className = 'review-status mt-2 text-sm text-red-600 dark:text-red-400';
                            statusDiv.textContent = '❌ Please select ratings for all categories.';
                            return;
                        }

                        // Save to localStorage (simulating API)
                        const reviews = JSON.parse(localStorage.getItem('peer_reviews_data') || '{}');
                        reviews[memberId] = {
                            member_id: memberId,
                            member_name: memberName,
                            ratings: ratings,
                            comment: comment,
                            submitted_at: new Date().toISOString()
                        };
                        localStorage.setItem('peer_reviews_data', JSON.stringify(reviews));

                        // Mark as submitted
                        submitted[memberId] = true;
                        localStorage.setItem('peer_reviews_submitted', JSON.stringify(submitted));

                        // Update UI
                        statusDiv.className = 'review-status mt-2 text-sm text-green-600 dark:text-green-400';
                        statusDiv.textContent = '✅ Review submitted successfully!';
                        this.remove();
                        const submitSpan = document.createElement('span');
                        submitSpan.className = 'px-4 py-2 bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-300 rounded-lg text-sm';
                        submitSpan.textContent = '✅ Submitted';
                        this.parentElement.appendChild(submitSpan);

                        // Update stats
                        updatePeerReviewStats(members.length);
                    });
                });

                function updatePeerReviewStats(totalMembers) {
                    const submitted = JSON.parse(localStorage.getItem('peer_reviews_submitted') || '{}');
                    const reviewedCount = Object.keys(submitted).length;
                    const pendingCount = totalMembers - reviewedCount;
                    const completion = totalMembers > 0 ? Math.round((reviewedCount / totalMembers) * 100) : 0;

                    document.getElementById('reviewed-count').innerHTML = `<p class="text-2xl font-bold text-green-600 dark:text-green-400">${reviewedCount}</p><p class="text-sm text-gray-500 dark:text-gray-400">Reviewed</p>`;
                    document.getElementById('pending-count').innerHTML = `<p class="text-2xl font-bold text-yellow-600 dark:text-yellow-400">${pendingCount}</p><p class="text-sm text-gray-500 dark:text-gray-400">Pending</p>`;
                    document.getElementById('completion-count').innerHTML = `<p class="text-2xl font-bold text-gray-800 dark:text-gray-100">${completion}%</p><p class="text-sm text-gray-500 dark:text-gray-400">Completion</p>`;
                }
            });
        }

        // ============================================
        // INITIALIZATION
        // ============================================
        function init() {
            if (!AuthService.isAuthenticated()) {
                window.location.href = '/login.html';
                return;
            }

            var user = AuthService.getUser();
            if (user) {
                document.getElementById('user-name').textContent = (user.first_name || 'Student') + ' ' + (user.last_name || '');
                document.getElementById('user-avatar').textContent = getInitials((user.first_name || 'S') + ' ' + (user.last_name || 'T'));
            }

            document.getElementById('menuBtn')?.addEventListener('click', function() {
                document.getElementById('sidebar').classList.toggle('-translate-x-full');
            });

            document.getElementById('logoutBtn')?.addEventListener('click', function() {
                AuthService.logout();
            });

            renderPeerReviewPage();
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
