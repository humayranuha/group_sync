<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Group - GroupSync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        .sidebar-transition { transition: transform 0.3s ease-in-out; }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        .nav-link.active { background-color: #eff6ff; color: #1d4ed8; }
        .animate-spin { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50">
    <div id="student-dashboard">
        <!-- Sidebar -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-white shadow-lg transform -translate-x-full md:translate-x-0 transition-transform duration-300 z-30">
            <div class="h-16 bg-gradient-to-r from-blue-600 to-blue-700 flex items-center justify-center">
                <h1 class="text-xl font-bold text-white">GroupSync</h1>
                <span class="ml-2 text-xs text-blue-200">Student</span>
            </div>
            <nav class="p-4 space-y-1">
                <a href="/student/dashboard.html" data-page="dashboard" class="nav-link flex items-center px-3 py-2 rounded-lg transition-colors hover:bg-gray-100">
                    <span class="text-xl mr-3">📊</span><span>Dashboard</span>
                </a>
                <a href="/student/group-details.html" data-page="group" class="nav-link active flex items-center px-3 py-2 rounded-lg transition-colors hover:bg-gray-100">
                    <span class="text-xl mr-3">👥</span><span>My Group</span>
                </a>
                <a href="/student/repository-connection.html" data-page="repository" class="nav-link flex items-center px-3 py-2 rounded-lg transition-colors hover:bg-gray-100">
                    <span class="text-xl mr-3">🔗</span><span>GitHub Connection</span>
                </a>
                <a href="/student/contribution-analytics.html" data-page="analytics" class="nav-link flex items-center px-3 py-2 rounded-lg transition-colors hover:bg-gray-100">
                    <span class="text-xl mr-3">📈</span><span>Analytics</span>
                </a>
                <a href="#" data-page="peer-review" class="nav-link flex items-center px-3 py-2 rounded-lg transition-colors hover:bg-gray-100">
                    <span class="text-xl mr-3">⭐</span><span>Peer Reviews</span>
                </a>
                <a href="/student/ai-feedback.html" data-page="ai-feedback" class="nav-link flex items-center px-3 py-2 rounded-lg transition-colors hover:bg-gray-100">
                    <span class="text-xl mr-3">🤖</span><span>AI Feedback</span>
                </a>
            </nav>
            <div class="absolute bottom-0 w-full p-4 border-t bg-gray-50">
                <div class="flex items-center">
                    <div id="user-avatar" class="w-10 h-10 bg-gradient-to-r from-blue-400 to-blue-600 rounded-full flex items-center justify-center text-white font-semibold text-lg">ST</div>
                    <div class="ml-3 flex-1">
                        <p id="user-name" class="text-sm font-medium text-gray-800">Student</p>
                        <p class="text-xs text-gray-500">Student</p>
                    </div>
                    <button id="logoutBtn" class="p-2 text-red-500 hover:text-red-700 transition" title="Logout">🚪</button>
                </div>
            </div>
        </aside>

        <!-- Mobile Menu Button -->
        <button id="menuBtn" class="fixed top-4 left-4 z-40 md:hidden bg-blue-600 text-white p-2 rounded-lg shadow-lg">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
        </button>

        <!-- Main Content -->
        <main class="md:ml-64 p-6">
            <div id="page-content">
                <div class="space-y-6 animate-fade-in">
                    <!-- Group Header -->
                    <div class="bg-gradient-to-r from-blue-500 to-blue-600 rounded-lg shadow-lg p-6 text-white">
                        <div class="flex justify-between items-start">
                            <div>
                                <h2 class="text-2xl font-bold" id="group-name">Loading...</h2>
                                <p class="text-blue-100 mt-1" id="course-name">Course: Loading...</p>
                            </div>
                            <span id="member-count" class="px-3 py-1 bg-white/20 rounded-full text-sm">0 Members</span>
                        </div>
                    </div>
                    
                    <!-- Group Stats -->
                    <div class="grid grid-cols-1 gap-6 sm:grid-cols-3">
                        <div class="bg-white rounded-lg shadow p-6">
                            <p class="text-sm text-gray-600">Total Contributions</p>
                            <p class="text-2xl font-bold text-gray-900 mt-1" id="total-contributions">0</p>
                        </div>
                        <div class="bg-white rounded-lg shadow p-6">
                            <p class="text-sm text-gray-600">Average Activity</p>
                            <p class="text-2xl font-bold text-gray-900 mt-1" id="avg-activity">0%</p>
                        </div>
                        <div class="bg-white rounded-lg shadow p-6">
                            <p class="text-sm text-gray-600">Team Performance</p>
                            <p class="text-2xl font-bold text-gray-900 mt-1" id="team-performance">0/100</p>
                        </div>
                    </div>
                    
                    <!-- Team Members -->
                    <div class="bg-white rounded-lg shadow overflow-hidden">
                        <div class="px-6 py-4 border-b border-gray-200">
                            <h3 class="text-lg font-semibold text-gray-800">Team Members</h3>
                        </div>
                        <div id="members-list" class="divide-y divide-gray-200">
                            <div class="p-6 text-center text-gray-500">Loading team members...</div>
                        </div>
                    </div>
                    
                    <!-- Contribution Distribution -->
                    <div class="bg-white rounded-lg shadow p-6">
                        <h3 class="text-lg font-semibold text-gray-800 mb-4">Contribution Distribution</h3>
                        <canvas id="contributionChart" height="300"></canvas>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // ============================================
        // CONFIGURATION
        // ============================================
        const API_BASE = '/api';
        const STORAGE_KEYS = {
            TOKEN: 'groupsync_auth_token',
            USER: 'groupsync_user_data'
        };

        // ============================================
        // TOAST SYSTEM
        // ============================================
        class ToastManager {
            constructor() {
                this.container = null;
                this.init();
            }
            init() {
                this.container = document.createElement('div');
                this.container.className = 'fixed bottom-4 right-4 z-50 space-y-2';
                document.body.appendChild(this.container);
            }
            show(message, type, duration) {
                type = type || 'info';
                duration = duration || 5000;
                var toast = document.createElement('div');
                var colors = {
                    success: 'bg-green-50 border-green-400 text-green-800',
                    error: 'bg-red-50 border-red-400 text-red-800',
                    warning: 'bg-yellow-50 border-yellow-400 text-yellow-800',
                    info: 'bg-blue-50 border-blue-400 text-blue-800'
                };
                var icons = { success: '✓', error: '✕', warning: '⚠', info: 'ℹ' };
                toast.className = 'transform transition-all duration-300 translate-x-full opacity-0 border-l-4 rounded-lg shadow-lg p-4 mb-2 ' + colors[type];
                toast.innerHTML = '<div class="flex items-center"><span class="text-lg font-bold mr-2">' + icons[type] + '</span><p class="text-sm">' + message + '</p><button class="ml-auto font-bold hover:text-gray-700">&times;</button></div>';
                this.container.appendChild(toast);
                setTimeout(function() { toast.classList.add('translate-x-0', 'opacity-100'); }, 10);
                toast.querySelector('button').onclick = function() { toast.remove(); };
                setTimeout(function() { if(toast.parentNode) toast.remove(); }, duration);
                return toast;
            }
            success(m) { this.show(m, 'success'); }
            error(m) { this.show(m, 'error'); }
            warning(m) { this.show(m, 'warning'); }
            info(m) { this.show(m, 'info'); }
        }

        // ============================================
        // LOADING SYSTEM
        // ============================================
        class LoadingManager {
            show() {
                if(this.loader) return;
                this.loader = document.createElement('div');
                this.loader.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50';
                this.loader.innerHTML = '<div class="bg-white rounded-lg p-6"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mx-auto"></div><p class="mt-2 text-gray-700">Loading...</p></div>';
                document.body.appendChild(this.loader);
            }
            hide() { if(this.loader) { this.loader.remove(); this.loader = null; } }
        }

        // ============================================
        // AUTH SERVICE
        // ============================================
        var AuthService = {
            getToken: function() { return localStorage.getItem(STORAGE_KEYS.TOKEN); },
            getUser: function() { var data = localStorage.getItem(STORAGE_KEYS.USER); return data ? JSON.parse(data) : null; },
            isAuthenticated: function() { return !!this.getToken(); },
            logout: function() {
                localStorage.removeItem(STORAGE_KEYS.TOKEN);
                localStorage.removeItem(STORAGE_KEYS.USER);
                window.location.href = '/login.html';
            }
        };

        // ============================================
        // API SERVICE
        // ============================================
        var ApiService = {
            request: async function(endpoint, options) {
                options = options || {};
                var token = AuthService.getToken();
                var headers = {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                };
                if (token) {
                    headers['Authorization'] = 'Bearer ' + token;
                }
                var response = await fetch(API_BASE + endpoint, {
                    method: options.method || 'GET',
                    headers: headers,
                    body: options.body || null
                });
                var data = await response.json();
                if (!response.ok) {
                    if (response.status === 401) AuthService.logout();
                    throw new Error(data.message || 'Request failed');
                }
                return data;
            },
            get: function(endpoint) { return this.request(endpoint, { method: 'GET' }); },
            post: function(endpoint, data) { return this.request(endpoint, { method: 'POST', body: JSON.stringify(data) }); }
        };

        // ============================================
        // GLOBALS
        // ============================================
        window.toast = new ToastManager();
        window.loading = new LoadingManager();
        window.api = ApiService;
        window.auth = AuthService;

        // ============================================
        // GROUP DETAILS LOGIC
        // ============================================
        var charts = {};

        function getInitials(name) {
            if (!name) return 'ST';
            var parts = name.split(' ');
            return parts.map(function(n) { return n[0]; }).join('').toUpperCase().slice(0, 2);
        }

        function getClassificationClass(classification) {
            var classes = {
                'Active': 'bg-green-100 text-green-800',
                'Moderate': 'bg-yellow-100 text-yellow-800',
                'Passive': 'bg-orange-100 text-orange-800',
                'Free Rider': 'bg-red-100 text-red-800'
            };
            return classes[classification] || 'bg-gray-100 text-gray-600';
        }

        // ============================================
        // LOAD GROUP DATA
        // ============================================
        async function loadGroupDetails() {
            try {
                var user = AuthService.getUser();
                if (!user) {
                    window.location.href = '/login.html';
                    return;
                }

                // Demo data - in real app, fetch from API
                var groupData = {
                    name: 'Team Alpha',
                    course_name: 'Software Engineering (CS401)',
                    member_count: 4,
                    total_contributions: 98,
                    avg_activity: 78,
                    team_performance: 82,
                    members: [
                        { name: 'John Doe', role: 'Student', contribution_percentage: 35, classification: 'Active', commits: 45, prs: 8, lines_added: 1250 },
                        { name: 'Jane Smith', role: 'Student', contribution_percentage: 28, classification: 'Active', commits: 32, prs: 5, lines_added: 890 },
                        { name: 'Mike Brown', role: 'Student', contribution_percentage: 22, classification: 'Moderate', commits: 18, prs: 3, lines_added: 450 },
                        { name: 'Lisa Wong', role: 'Student', contribution_percentage: 15, classification: 'Passive', commits: 8, prs: 1, lines_added: 200 }
                    ]
                };

                updateGroupUI(groupData);
                renderMembersList(groupData.members);
                renderContributionChart(groupData.members);

            } catch (error) {
                console.error('Error loading group details:', error);
                window.toast.error('Failed to load group data');
            }
        }

        function updateGroupUI(group) {
            document.getElementById('group-name').textContent = group.name;
            document.getElementById('course-name').textContent = 'Course: ' + group.course_name;
            document.getElementById('member-count').textContent = group.member_count + ' Members';
            document.getElementById('total-contributions').textContent = group.total_contributions || 0;
            document.getElementById('avg-activity').textContent = (group.avg_activity || 0) + '%';
            document.getElementById('team-performance').textContent = group.team_performance || 0;
        }

        function renderMembersList(members) {
            var container = document.getElementById('members-list');
            
            if (members && members.length > 0) {
                var html = '';
                for (var i = 0; i < members.length; i++) {
                    var member = members[i];
                    var isYou = (i === 0) ? ' (You)' : '';
                    html += `
                        <div class="flex items-center justify-between p-4 hover:bg-gray-50 transition">
                            <div class="flex items-center">
                                <div class="w-10 h-10 rounded-full bg-gradient-to-r from-blue-400 to-blue-600 flex items-center justify-center text-white font-semibold">
                                    ${getInitials(member.name)}
                                </div>
                                <div class="ml-4">
                                    <p class="text-sm font-medium text-gray-900">${member.name}${isYou}</p>
                                    <p class="text-xs text-gray-500">${member.role || 'Student'}</p>
                                </div>
                            </div>
                            <div class="flex items-center space-x-4">
                                <div class="text-right">
                                    <p class="text-sm font-semibold text-gray-900">${member.contribution_percentage || 0}%</p>
                                    <p class="text-xs text-gray-500">Contributions</p>
                                </div>
                                <span class="px-2 py-1 rounded-full text-xs font-medium ${getClassificationClass(member.classification)}">
                                    ${member.classification || 'Moderate'}
                                </span>
                            </div>
                        </div>
                    `;
                }
                container.innerHTML = html;
            } else {
                container.innerHTML = '<div class="p-6 text-center text-gray-500">No members found in this group.</div>';
            }
        }

        function renderContributionChart(members) {
            var ctx = document.getElementById('contributionChart')?.getContext('2d');
            if (!ctx || !members || members.length === 0) return;
            
            if (charts.contribution) charts.contribution.destroy();
            
            var labels = members.map(function(m) { return m.name; });
            var data = members.map(function(m) { return m.contribution_percentage || 0; });
            var colors = ['#3b82f6', '#60a5fa', '#93c5fd', '#bfdbfe', '#1e3a8a', '#2563eb', '#1d4ed8', '#1e40af'];
            
            charts.contribution = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: colors.slice(0, data.length),
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return context.label + ': ' + context.parsed + '%';
                                }
                            }
                        }
                    }
                }
            });
        }

        // ============================================
        // INITIALIZATION
        // ============================================
        function init() {
            if (!AuthService.isAuthenticated()) {
                window.location.href = '/login.html';
                return;
            }

            var user = AuthService.getUser();
            if (user) {
                document.getElementById('user-name').textContent = (user.first_name || 'Student') + ' ' + (user.last_name || '');
                document.getElementById('user-avatar').textContent = getInitials((user.first_name || 'S') + ' ' + (user.last_name || 'T'));
            }

            document.getElementById('menuBtn')?.addEventListener('click', function() {
                document.getElementById('sidebar').classList.toggle('-translate-x-full');
            });

            document.getElementById('logoutBtn')?.addEventListener('click', function() {
                AuthService.logout();
            });

            loadGroupDetails();
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
