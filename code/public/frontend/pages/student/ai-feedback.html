<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Feedback - GroupSync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        /* Copy styles from dashboard.html */
        * { font-family: 'Inter', system-ui, sans-serif; }
        body { transition: background 0.5s ease, color 0.4s ease; background: #f6f9fc; }
        .dark body { background: #0b1717; color: #e8edf0; }
        .dark .bg-white { background-color: #132424 !important; }
        .dark .bg-gray-50 { background-color: #0b1717 !important; }
        .dark .text-gray-600, .dark .text-gray-700, .dark .text-gray-800 { color: #cbd5e1 !important; }
        .dark .border-gray-200 { border-color: #1e3a3a !important; }
        .dark .shadow { box-shadow: 0 4px 16px rgba(0,0,0,0.4) !important; }
        
        .sidebar-teal { background: linear-gradient(180deg, #0b1717 0%, #1a3a38 100%); border-right: 1px solid rgba(58,175,169,0.08); }
        .nav-link { transition: all 0.3s ease; color: rgba(255,255,255,0.55); border-radius: 12px; padding: 0.65rem 1rem; display: flex; align-items: center; gap: 0.75rem; font-weight: 500; font-size: 0.95rem; cursor: pointer; text-decoration: none; }
        .nav-link:hover { background: rgba(58,175,169,0.08); color: #fff; }
        .nav-link.active { background: rgba(58,175,169,0.15); color: #3AAFA9; }
        .nav-link .icon { width: 24px; text-align: center; font-size: 1.15rem; }
        
        .card-glass { background: rgba(255,255,255,0.80); backdrop-filter: blur(4px); border: 1px solid rgba(58,175,169,0.06); border-radius: 20px; transition: all 0.4s cubic-bezier(0.22,1,0.36,1); }
        .dark .card-glass { background: rgba(19,36,36,0.80); border-color: rgba(58,175,169,0.06); }
        
        .btn-teal { background: #3AAFA9; color: #fff; transition: all 0.3s ease; box-shadow: 0 4px 14px rgba(58,175,169,0.25); padding: 0.6rem 1.5rem; border-radius: 12px; font-weight: 600; border: none; cursor: pointer; }
        .btn-teal:hover { background: #2B7A78; transform: translateY(-2px); }
        .dark .btn-teal { background: #2B7A78; }
        
        .badge-active { background: rgba(58,175,169,0.15); color: #3AAFA9; }
        .badge-moderate { background: rgba(58,175,169,0.10); color: #7ccfca; }
        .badge-passive { background: rgba(58,175,169,0.08); color: #94a3b8; }
        .badge-free-rider { background: rgba(58,175,169,0.06); color: #64748b; }
        
        .theme-toggle { transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: rgba(255,255,255,0.05); border: none; cursor: pointer; color: rgba(255,255,255,0.70); font-size: 17px; }
        .theme-toggle:hover { transform: rotate(25deg) scale(1.05); background: rgba(255,255,255,0.12); }
        
        .menu-btn { background: rgba(58,175,169,0.90); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.08); }
        .menu-btn:hover { background: #2B7A78; transform: scale(1.04); }
        
        .logout-btn { transition: all 0.3s ease; color: rgba(255,255,255,0.40); background: transparent; border: none; cursor: pointer; font-size: 1.2rem; padding: 0.4rem 0.6rem; border-radius: 8px; }
        .logout-btn:hover { color: #3AAFA9; background: rgba(58,175,169,0.08); }
        
        @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.5s ease forwards; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; }
        
        .sidebar-scroll { overflow-y: auto; scrollbar-width: thin; scrollbar-color: rgba(58,175,169,0.15) transparent; }
        .sidebar-scroll::-webkit-scrollbar { width: 4px; }
        .sidebar-scroll::-webkit-scrollbar-thumb { background: rgba(58,175,169,0.15); border-radius: 999px; }
        
        @media (max-width:768px) { .stat-card { padding:1rem; } }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar-teal fixed inset-y-0 left-0 w-64 shadow-2xl transform -translate-x-full md:translate-x-0 transition-transform duration-300 z-40 flex flex-col">
        <div class="h-16 flex items-center justify-center gap-2 border-b border-white/5 shrink-0">
            <a href="#" class="text-2xl font-extrabold tracking-tight text-white">Group<span class="text-[#c6f0ee]">Sync</span></a>
            <span class="text-[10px] font-medium tracking-widest uppercase bg-white/10 text-white/50 px-2 py-0.5 rounded-full border border-white/5">Student</span>
        </div>
        <nav class="flex-1 px-3 py-4 space-y-0.5 sidebar-scroll">
            <a href="dashboard.html" class="nav-link"><span class="icon">📊</span> Dashboard</a>
            <a href="group-details.html" class="nav-link"><span class="icon">👥</span> My Group</a>
            <a href="repository-connection.html" class="nav-link"><span class="icon">🔗</span> GitHub Connection</a>
            <a href="contribution-analytics.html" class="nav-link"><span class="icon">📈</span> Analytics</a>
            <a href="peer-review.html" class="nav-link"><span class="icon">⭐</span> Peer Reviews</a>
            <a href="ai-feedback.html" class="nav-link active"><span class="icon">🤖</span> AI Feedback</a>
        </nav>
        <div class="shrink-0 p-4 border-t border-white/5 bg-black/10 backdrop-blur-sm">
            <div class="flex items-center gap-3">
                <div id="user-avatar" class="w-10 h-10 rounded-full bg-gradient-to-br from-[#3AAFA9] to-[#2B7A78] flex items-center justify-center text-white font-semibold text-sm">ST</div>
                <div class="flex-1 min-w-0"><p id="user-name" class="text-sm font-medium text-white truncate">Student</p><p class="text-xs text-white/40 truncate">Student</p></div>
                <button id="logoutBtn" class="logout-btn" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
    </aside>

    <!-- Mobile Menu -->
    <button id="menuBtn" class="menu-btn fixed top-4 left-4 z-50 md:hidden text-white p-2.5 rounded-xl shadow-lg"><i class="fas fa-bars text-lg"></i></button>

    <!-- Header -->
    <header class="fixed top-0 right-0 left-0 md:left-64 z-30 bg-[rgba(43,122,120,0.88)] backdrop-blur-[14px] border-b border-[rgba(58,175,169,0.12)]">
        <div class="max-w-full px-4 sm:px-6 lg:px-8 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-sm font-medium text-white/70 hidden sm:block">AI Feedback</span>
            </div>
            <div class="flex items-center gap-3">
                <button id="themeToggle" class="theme-toggle"><i id="themeIcon" class="fas fa-sun"></i></button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="md:ml-64 pt-16 pb-8 px-4 sm:px-6 lg:px-8 min-h-screen">
        <div id="page-content" class="animate-fade-in">
            <div class="flex items-center justify-center h-64">
                <div class="text-center">
                    <div class="animate-spin rounded-full h-12 w-12 border-2 border-[#3AAFA9] border-t-transparent mx-auto"></div>
                    <p class="text-gray-500 dark:text-gray-400 mt-4 text-sm">Loading AI evaluation...</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // ============================================
        // CONFIGURATION
        // ============================================
        const API_BASE = 'http://127.0.0.1:8000/api';
        const STORAGE_KEYS = { TOKEN: 'groupsync_auth_token', USER: 'groupsync_user_data', THEME: 'theme' };

        // ============================================
        // AUTH SERVICE
        // ============================================
        const AuthService = {
            getToken() { return localStorage.getItem(STORAGE_KEYS.TOKEN); },
            getUser() { const data = localStorage.getItem(STORAGE_KEYS.USER); return data ? JSON.parse(data) : null; },
            isAuthenticated() { return !!this.getToken(); },
            logout() {
                localStorage.removeItem(STORAGE_KEYS.TOKEN);
                localStorage.removeItem(STORAGE_KEYS.USER);
                window.location.href = '/frontend/pages/public/login.html';
            }
        };

        // ============================================
        // API SERVICE
        // ============================================
        const ApiService = {
            async request(endpoint, options = {}) {
                const token = AuthService.getToken();
                const headers = { 'Content-Type': 'application/json', 'Accept': 'application/json', ...options.headers };
                if (token) headers['Authorization'] = `Bearer ${token}`;
                try {
                    const response = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });
                    const data = await response.json();
                    if (!response.ok) {
                        if (response.status === 401) AuthService.logout();
                        throw new Error(data.message || 'Request failed');
                    }
                    return data;
                } catch (error) {
                    console.error('API Error:', error);
                    throw error;
                }
            },
            get(endpoint) { return this.request(endpoint, { method: 'GET' }); }
        };

        // ============================================
        // HELPERS
        // ============================================
        function getInitials(name) {
            if (!name) return 'ST';
            return name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
        }

        function getClassificationClass(classification) {
            const map = { 'Active': 'badge-active', 'Moderate': 'badge-moderate', 'Passive': 'badge-passive', 'Free Rider': 'badge-free-rider' };
            return map[classification] || 'badge-moderate';
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            const colors = {
                success: 'bg-green-50 border-green-400 text-green-800 dark:bg-green-900/20 dark:text-green-300',
                error: 'bg-red-50 border-red-400 text-red-800 dark:bg-red-900/20 dark:text-red-300',
                warning: 'bg-yellow-50 border-yellow-400 text-yellow-800 dark:bg-yellow-900/20 dark:text-yellow-300',
                info: 'bg-blue-50 border-blue-400 text-blue-800 dark:bg-blue-900/20 dark:text-blue-300'
            };
            toast.className = `fixed bottom-4 right-4 z-50 border-l-4 rounded-xl shadow-xl p-4 max-w-sm ${colors[type]}`;
            toast.innerHTML = `<div class="flex items-center"><span class="text-lg font-bold mr-2">${type === 'success' ? '✓' : type === 'error' ? '✕' : 'ℹ'}</span><p class="text-sm font-medium">${message}</p><button class="ml-auto font-bold hover:opacity-70" onclick="this.parentElement.parentElement.remove()">&times;</button></div>`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        }

        // ============================================
        // AI FEEDBACK LOGIC
        // ============================================
        let aiCharts = {};

        async function loadAIFeedback() {
            const container = document.getElementById('page-content');
            
            try {
                const user = AuthService.getUser();
                if (!user) {
                    window.location.href = '/frontend/pages/public/login.html';
                    return;
                }

                // Try to fetch from API
                let aiData = null;
                try {
                    const response = await ApiService.get(`/ai/evaluate/student/${user.id}`);
                    if (response.success) {
                        aiData = response;
                    }
                } catch (e) {
                    console.log('Using demo AI data');
                }

                // Use demo data if API fails
                if (!aiData) {
                    aiData = {
                        classification: 'Active Contributor',
                        overall_score: 85,
                        participation_score: 85,
                        quality_score: 78,
                        consistency_score: 92,
                        feedback: 'Excellent contribution quality and consistency! You\'re demonstrating strong collaboration skills and delivering high-quality work. Your activity pattern shows regular engagement with the repository.',
                        suggestions: [
                            'Increase code review participation by reviewing teammates\' PRs regularly',
                            'Help mentor passive group members to improve overall team performance',
                            'Document your code more thoroughly for better knowledge transfer'
                        ],
                        weekly_trend: {
                            labels: ['Week 1', 'Week 2', 'Week 3', 'Week 4', 'Week 5', 'Week 6', 'Week 7', 'Week 8'],
                            you: [70, 72, 75, 78, 80, 82, 85, 87],
                            team: [68, 70, 71, 73, 74, 75, 76, 77]
                        },
                        team_comparison: {
                            labels: ['Commits', 'Code Quality', 'PRs', 'Reviews', 'Documentation', 'Collaboration'],
                            you: [85, 78, 82, 70, 75, 80],
                            team: [75, 72, 70, 68, 65, 70]
                        }
                    };
                }

                renderAIFeedbackUI(aiData);

            } catch (error) {
                console.error('Error loading AI feedback:', error);
                container.innerHTML = `
                    <div class="card-glass p-6 text-center">
                        <i class="fas fa-exclamation-circle text-4xl text-red-500 mb-4"></i>
                        <p class="text-gray-600 dark:text-gray-400">Failed to load AI feedback</p>
                        <button onclick="loadAIFeedback()" class="btn-teal mt-4">Retry</button>
                    </div>
                `;
            }
        }

        function renderAIFeedbackUI(data) {
            const container = document.getElementById('page-content');
            
            container.innerHTML = `
                <div class="space-y-6">
                    <div class="flex flex-wrap justify-between items-center gap-4">
                        <h2 class="text-2xl font-bold text-gray-800 dark:text-gray-100">🤖 AI Evaluation Feedback</h2>
                        <button id="refreshBtn" class="btn-teal"><i class="fas fa-sync-alt mr-2"></i> Refresh Analysis</button>
                    </div>

                    <!-- Classification -->
                    <div class="card-glass p-6 bg-gradient-to-r from-[#3AAFA9]/5 to-[#2B7A78]/5 border-[#3AAFA9]/10">
                        <div class="flex flex-wrap items-center justify-between gap-4">
                            <div>
                                <h3 class="text-xl font-semibold text-gray-800 dark:text-gray-100">Your Performance Classification</h3>
                                <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Week 8 Evaluation</p>
                            </div>
                            <span id="classificationBadge" class="px-4 py-2 rounded-full text-lg font-semibold ${getClassificationClass(data.classification)}">${data.classification}</span>
                        </div>
                    </div>

                    <!-- Score Cards -->
                    <div class="grid grid-cols-1 gap-4 sm:grid-cols-3">
                        <div class="card-glass p-6 text-center">
                            <div class="text-4xl mb-2">📊</div>
                            <p class="text-sm text-gray-500 dark:text-gray-400">Participation Score</p>
                            <p class="text-3xl font-bold text-[#3AAFA9] mt-2" id="participation-score">${data.participation_score}</p>
                            <p class="text-xs text-gray-400 mt-1">out of 100</p>
                        </div>
                        <div class="card-glass p-6 text-center">
                            <div class="text-4xl mb-2">⭐</div>
                            <p class="text-sm text-gray-500 dark:text-gray-400">Quality Score</p>
                            <p class="text-3xl font-bold text-[#3AAFA9] mt-2" id="quality-score">${data.quality_score}</p>
                            <p class="text-xs text-gray-400 mt-1">out of 100</p>
                        </div>
                        <div class="card-glass p-6 text-center">
                            <div class="text-4xl mb-2">📈</div>
                            <p class="text-sm text-gray-500 dark:text-gray-400">Consistency Score</p>
                            <p class="text-3xl font-bold text-[#3AAFA9] mt-2" id="consistency-score">${data.consistency_score}</p>
                            <p class="text-xs text-gray-400 mt-1">out of 100</p>
                        </div>
                    </div>

                    <!-- Feedback -->
                    <div class="card-glass p-6">
                        <h3 class="text-lg font-semibold text-gray-800 dark:text-gray-100 mb-2">AI Feedback</h3>
                        <p class="text-gray-600 dark:text-gray-300 leading-relaxed" id="ai-feedback-text">${data.feedback}</p>
                    </div>

                    <!-- Suggestions -->
                    <div class="card-glass p-6">
                        <h3 class="text-lg font-semibold text-gray-800 dark:text-gray-100 mb-4">💡 Improvement Suggestions</h3>
                        <ul class="space-y-2">
                            ${data.suggestions.map(s => `
                                <li class="flex items-start gap-3 p-3 rounded-lg bg-gray-50 dark:bg-gray-800">
                                    <span class="text-[#3AAFA9] text-lg mt-0.5">•</span>
                                    <span class="text-gray-700 dark:text-gray-300">${s}</span>
                                </li>
                            `).join('')}
                        </ul>
                    </div>

                    <!-- Suspicious Activity -->
                    <div class="card-glass p-6 border-l-4 border-yellow-400 bg-yellow-50 dark:bg-yellow-900/10">
                        <div class="flex items-start gap-3">
                            <span class="text-2xl">⚠️</span>
                            <div>
                                <h3 class="text-lg font-semibold text-yellow-800 dark:text-yellow-300">Suspicious Activity Detection</h3>
                                <p class="text-yellow-700 dark:text-yellow-400 mt-1">No suspicious activity detected in your contribution history.</p>
                            </div>
                        </div>
                    </div>

                    <!-- Weekly Performance Chart -->
                    <div class="card-glass p-6">
                        <h3 class="text-lg font-semibold text-gray-800 dark:text-gray-100 mb-4">Weekly Performance Trend</h3>
                        <canvas id="weeklyTrendChart" height="250"></canvas>
                    </div>

                    <!-- Team Comparison -->
                    <div class="card-glass p-6">
                        <h3 class="text-lg font-semibold text-gray-800 dark:text-gray-100 mb-4">Comparison with Team Average</h3>
                        <canvas id="teamComparisonChart" height="250"></canvas>
                    </div>
                </div>
            `;

            // Render charts
            renderAICharts(data);
        }

        function renderAICharts(data) {
            // Weekly Trend Chart
            const trendCtx = document.getElementById('weeklyTrendChart')?.getContext('2d');
            if (trendCtx) {
                if (aiCharts.trend) aiCharts.trend.destroy();
                aiCharts.trend = new Chart(trendCtx, {
                    type: 'line',
                    data: {
                        labels: data.weekly_trend.labels,
                        datasets: [
                            {
                                label: 'Your Performance',
                                data: data.weekly_trend.you,
                                borderColor: '#3AAFA9',
                                backgroundColor: 'rgba(58,175,169,0.08)',
                                tension: 0.4,
                                fill: true,
                                pointBackgroundColor: '#3AAFA9',
                                pointBorderColor: '#fff',
                                pointBorderWidth: 2,
                                pointRadius: 5
                            },
                            {
                                label: 'Team Average',
                                data: data.weekly_trend.team,
                                borderColor: '#10b981',
                                backgroundColor: 'rgba(16,185,129,0.08)',
                                tension: 0.4,
                                fill: true,
                                pointBackgroundColor: '#10b981',
                                pointBorderColor: '#fff',
                                pointBorderWidth: 2,
                                pointRadius: 5
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        plugins: { legend: { position: 'top', labels: { font: { size: 12 } } } },
                        scales: {
                            y: { beginAtZero: true, max: 100, title: { display: true, text: 'Performance Score (%)' }, grid: { color: 'rgba(0,0,0,0.04)' } },
                            x: { grid: { display: false } }
                        }
                    }
                });
            }

            // Team Comparison Chart
            const compCtx = document.getElementById('teamComparisonChart')?.getContext('2d');
            if (compCtx) {
                if (aiCharts.comparison) aiCharts.comparison.destroy();
                aiCharts.comparison = new Chart(compCtx, {
                    type: 'radar',
                    data: {
                        labels: data.team_comparison.labels,
                        datasets: [
                            {
                                label: 'You',
                                data: data.team_comparison.you,
                                borderColor: '#3AAFA9',
                                backgroundColor: 'rgba(58,175,169,0.15)',
                                pointBackgroundColor: '#3AAFA9',
                                pointBorderColor: '#fff',
                                pointBorderWidth: 2
                            },
                            {
                                label: 'Team Average',
                                data: data.team_comparison.team,
                                borderColor: '#10b981',
                                backgroundColor: 'rgba(16,185,129,0.15)',
                                pointBackgroundColor: '#10b981',
                                pointBorderColor: '#fff',
                                pointBorderWidth: 2
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        scales: { r: { beginAtZero: true, max: 100, ticks: { stepSize: 20 } } },
                        plugins: { legend: { position: 'top', labels: { font: { size: 12 } } } }
                    }
                });
            }
        }

        // ============================================
        // THEME TOGGLE
        // ============================================
        (function initTheme() {
            const toggle = document.getElementById('themeToggle');
            const icon = document.getElementById('themeIcon');
            const html = document.documentElement;
            const saved = localStorage.getItem(STORAGE_KEYS.THEME);
            
            if (saved === 'dark') {
                html.classList.add('dark');
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
            }
            
            toggle.addEventListener('click', function() {
                const isDark = html.classList.toggle('dark');
                if (isDark) {
                    icon.classList.remove('fa-sun');
                    icon.classList.add('fa-moon');
                    localStorage.setItem(STORAGE_KEYS.THEME, 'dark');
                } else {
                    icon.classList.remove('fa-moon');
                    icon.classList.add('fa-sun');
                    localStorage.setItem(STORAGE_KEYS.THEME, 'light');
                }
            });
        })();

        // ============================================
        // INIT
        // ============================================
        function init() {
            if (!AuthService.isAuthenticated()) {
                window.location.href = '/frontend/pages/public/login.html';
                return;
            }

            const user = AuthService.getUser();
            if (user) {
                document.getElementById('user-name').textContent = `${user.first_name || 'Student'} ${user.last_name || ''}`.trim();
                document.getElementById('user-avatar').textContent = getInitials(`${user.first_name || 'S'} ${user.last_name || 'T'}`);
            }

            document.getElementById('menuBtn')?.addEventListener('click', () => {
                document.getElementById('sidebar').classList.toggle('-translate-x-full');
            });

            document.getElementById('logoutBtn')?.addEventListener('click', () => AuthService.logout());

            document.getElementById('refreshBtn')?.addEventListener('click', function() {
                showToast('🔄 AI feedback refreshed!', 'success');
                loadAIFeedback();
            });

            loadAIFeedback();
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
