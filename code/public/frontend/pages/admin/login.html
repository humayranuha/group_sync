<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - GroupSync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', system-ui, sans-serif; }
        body { background: #0b1717; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card {
            background: rgba(19, 36, 36, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(58, 175, 169, 0.15);
            border-radius: 32px;
            padding: 2.5rem;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            transition: all 0.4s;
        }
        .login-card:hover { border-color: #3AAFA9; box-shadow: 0 30px 60px -15px rgba(58, 175, 169, 0.10); }
        .input-teal {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.3s;
            color: #fff;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            width: 100%;
            font-size: 0.95rem;
        }
        .input-teal:focus { border-color: #3AAFA9; box-shadow: 0 0 0 3px rgba(58,175,169,0.15); background: rgba(255,255,255,0.06); outline: none; }
        .input-teal::placeholder { color: rgba(255,255,255,0.25); }
        .btn-teal {
            background: #3AAFA9; color: #fff; transition: all 0.3s;
            box-shadow: 0 4px 18px rgba(58,175,169,0.25);
            padding: 0.85rem 2rem; border-radius: 14px; font-weight: 600; border: none; width: 100%; cursor: pointer;
        }
        .btn-teal:hover { background: #2B7A78; transform: translateY(-2px); box-shadow: 0 8px 28px rgba(58,175,169,0.30); }
        .brand-gradient { background: linear-gradient(135deg, #3AAFA9, #2B7A78); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .animate-spin { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .theme-toggle {
            cursor: pointer; transition: transform 0.3s;
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; background: rgba(255,255,255,0.05); border: none; color: rgba(255,255,255,0.70);
            font-size: 17px;
        }
        .theme-toggle:hover { transform: rotate(25deg); background: rgba(255,255,255,0.12); color: #fff; }
        .dark .theme-toggle { color: rgba(255,255,255,0.70); }
        .bg-animate {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(ellipse at 30% 40%, rgba(58,175,169,0.12) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 60%, rgba(43,122,120,0.08) 0%, transparent 50%);
            animation: bgFloat 15s ease-in-out infinite alternate;
        }
        @keyframes bgFloat {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-3%, -3%) scale(1.05); }
        }
    </style>
</head>
<body>
    <div class="bg-animate"></div>

    <div class="login-card">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="text-5xl mb-4">🔐</div>
            <h1 class="text-3xl font-extrabold text-white">Admin <span class="brand-gradient">Login</span></h1>
            <p class="text-gray-400 text-sm mt-2">Access the admin dashboard</p>
        </div>

        <!-- Login Form -->
        <form id="adminLoginForm" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Admin Email</label>
                <input type="email" id="adminEmail" placeholder="admin@demo.com" class="input-teal" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Password</label>
                <input type="password" id="adminPassword" placeholder="••••••••" class="input-teal" required>
            </div>
            <button type="submit" id="adminLoginBtn" class="btn-teal">
                <i class="fas fa-shield-alt mr-2"></i> Login as Admin
            </button>
        </form>

        <!-- Divider -->
        <div class="relative my-6">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/10"></div></div>
            <div class="relative flex justify-center text-sm"><span class="px-4 bg-transparent text-gray-400">Or</span></div>
        </div>

        <!-- Back to User Login -->
        <div class="text-center">
            <a href="/login.html" class="text-[#3AAFA9] hover:text-white text-sm font-medium transition">
                ← Back to User Login
            </a>
        </div>

        <!-- Demo Credentials -->
        <div class="mt-4 p-4 bg-white/5 rounded-xl border border-white/5">
            <p class="text-xs text-gray-400 text-center">
                <span class="font-semibold text-gray-300">Demo Credentials:</span><br>
                Email: <span class="text-[#3AAFA9] font-mono">admin@demo.com</span><br>
                Password: <span class="text-[#3AAFA9] font-mono">123456</span>
            </p>
        </div>

        <!-- Loading Overlay -->
        <div id="loadingOverlay" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
            <div class="bg-[#132424] rounded-xl p-6 text-center border border-white/10">
                <div class="animate-spin rounded-full h-12 w-12 border-2 border-[#3AAFA9] border-t-transparent mx-auto"></div>
                <p class="mt-4 text-gray-300 text-sm">Logging.....</p>
            </div>
        </div>

        <!-- Message Container -->
        <div id="message-container" class="fixed top-4 right-4 z-50 space-y-2 max-w-md"></div>
    </div>

    <script>
        // ============================================
        // ADMIN LOGIN
        // ============================================
        const API_BASE = '/api';

        document.getElementById('adminLoginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;
            const btn = document.getElementById('adminLoginBtn');
            const loading = document.getElementById('loadingOverlay');

            if (!email || !password) {
                showMessage('Please fill all fields', 'error');
                return;
            }

            btn.textContent = 'Logging in...';
            btn.disabled = true;
            loading.classList.remove('hidden');

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Check if user is admin
                    if (data.user && data.user.role === 'admin') {
                        localStorage.setItem('groupsync_auth_token', data.token);
                        localStorage.setItem('groupsync_user_data', JSON.stringify(data.user));
                        showMessage('✅ Admin login successful!', 'success');
                        setTimeout(() => {
                            window.location.href = '/admin/dashboard.html';
                        }, 1000);
                    } else {
                        showMessage('❌ Access denied. Admin privileges required.', 'error');
                    }
                } else {
                    showMessage(data.message || '❌ Invalid admin credentials', 'error');
                }
            } catch (error) {
                console.error('Login error:', error);
                showMessage('❌ Network error. Please try again.', 'error');
            } finally {
                btn.textContent = 'Login as Admin';
                btn.disabled = false;
                loading.classList.add('hidden');
            }
        });

        // ============================================
        // MESSAGE SYSTEM
        // ============================================
        function showMessage(message, type) {
            const container = document.getElementById('message-container') || (() => {
                const el = document.createElement('div');
                el.id = 'message-container';
                el.className = 'fixed top-4 right-4 z-50 space-y-2 max-w-md';
                document.body.appendChild(el);
                return el;
            })();

            const colors = {
                success: 'bg-[#3AAFA9]/10 border-[#3AAFA9] text-[#3AAFA9]',
                error: 'bg-red-500/10 border-red-500 text-red-400',
                warning: 'bg-yellow-500/10 border-yellow-500 text-yellow-400',
                info: 'bg-blue-500/10 border-blue-500 text-blue-400'
            };
            const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };

            const toast = document.createElement('div');
            toast.className = `transform transition-all duration-300 translate-x-full opacity-0 border-l-4 rounded-xl shadow-xl p-4 mb-2 ${colors[type]} dark:bg-[#132424]`;
            toast.innerHTML = `<div class="flex items-center"><span class="text-lg mr-2">${icons[type]}</span><p class="text-sm flex-1">${message}</p><button class="ml-2 text-gray-400 hover:text-gray-600" onclick="this.parentElement.remove()">&times;</button></div>`;
            container.appendChild(toast);
            setTimeout(() => { toast.classList.remove('translate-x-full', 'opacity-0'); }, 10);
            setTimeout(() => { if (toast.parentNode) toast.remove(); }, 5000);
        }
    </script>
</body>
</html>
