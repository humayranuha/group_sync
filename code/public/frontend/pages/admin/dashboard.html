<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - GroupSync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * { font-family: 'Inter', system-ui, sans-serif; }
        body { transition: background 0.5s ease, color 0.4s ease; background: #f6f9fc; }
        .dark body { background: #0b1717; color: #e8edf0; }
        .sidebar-teal { background: linear-gradient(180deg, #0b1717 0%, #1a3a38 100%); border-right: 1px solid rgba(58,175,169,0.08); }
        .dark .sidebar-teal { background: linear-gradient(180deg, #071010 0%, #0f2624 100%); }
        .nav-link { transition: all 0.3s ease; color: rgba(255,255,255,0.55); border-radius: 12px; padding: 0.65rem 1rem; display: flex; align-items: center; gap: 0.75rem; font-weight: 500; font-size: 0.95rem; }
        .nav-link:hover { background: rgba(58,175,169,0.08); color: #fff; }
        .nav-link.active { background: rgba(58,175,169,0.15); color: #3AAFA9; box-shadow: 0 0 20px rgba(58,175,169,0.05); }
        .nav-link .icon { width: 24px; text-align: center; font-size: 1.15rem; }
        .dark .nav-link.active { background: rgba(58,175,169,0.12); }
        .header-teal { background: rgba(43,122,120,0.88); backdrop-filter: blur(14px); border-bottom: 1px solid rgba(58,175,169,0.12); }
        .dark .header-teal { background: rgba(11,23,23,0.92); }
        .card-glass { background: rgba(255,255,255,0.80); backdrop-filter: blur(4px); border: 1px solid rgba(58,175,169,0.06); border-radius: 20px; transition: all 0.4s; }
        .dark .card-glass { background: rgba(19,36,36,0.80); }
        .stat-card { transition: all 0.4s; border: 1px solid rgba(58,175,169,0.06); background: rgba(255,255,255,0.80); backdrop-filter: blur(4px); border-radius: 20px; padding: 1.5rem; cursor: pointer; }
        .stat-card:hover { transform: translateY(-4px); border-color: #3AAFA9; box-shadow: 0 16px 32px -12px rgba(58,175,169,0.12); }
        .dark .stat-card { background: rgba(19,36,36,0.80); }
        .stat-icon { display: inline-flex; align-items: center; justify-content: center; width: 48px; height: 48px; border-radius: 14px; font-size: 1.3rem; transition: background 0.3s; }
        .stat-icon.teal-bg { background: rgba(58,175,169,0.10); color: #3AAFA9; }
        .dark .stat-icon.teal-bg { background: rgba(58,175,169,0.08); }
        .btn-teal { background: #3AAFA9; color: #fff; transition: all 0.3s ease; box-shadow: 0 4px 14px rgba(58,175,169,0.25); padding: 0.6rem 1.5rem; border-radius: 12px; font-weight: 600; border: none; cursor: pointer; }
        .btn-teal:hover { background: #2B7A78; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(58,175,169,0.30); }
        .theme-toggle { transition: transform 0.4s; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: rgba(255,255,255,0.05); border: none; cursor: pointer; color: rgba(255,255,255,0.70); font-size: 17px; }
        .theme-toggle:hover { transform: rotate(25deg) scale(1.05); background: rgba(255,255,255,0.12); color: #fff; }
        .logout-btn { transition: all 0.3s ease; color: rgba(255,255,255,0.40); background: transparent; border: none; cursor: pointer; font-size: 1.2rem; padding: 0.4rem 0.6rem; border-radius: 8px; }
        .logout-btn:hover { color: #3AAFA9; background: rgba(58,175,169,0.08); }
        .status-badge { padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 500; }
        .status-active { background-color: #dcfce7; color: #166534; }
        .status-inactive { background-color: #fee2e2; color: #991b1b; }
        .status-pending { background-color: #fef9c3; color: #854d0e; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.5s ease forwards; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; }
        .sidebar-scroll { overflow-y: auto; scrollbar-width: thin; scrollbar-color: rgba(58,175,169,0.15) transparent; }
        .sidebar-scroll::-webkit-scrollbar { width: 4px; }
        .sidebar-scroll::-webkit-scrollbar-track { background: transparent; }
        .sidebar-scroll::-webkit-scrollbar-thumb { background: rgba(58,175,169,0.15); border-radius: 999px; }
        @media (max-width:768px) { .stat-card { padding:1rem; } .stat-icon { width:40px; height:40px; font-size:1.1rem; } }
        .brand-gradient { background: linear-gradient(135deg, #3AAFA9, #2B7A78); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 9999; backdrop-filter: blur(4px); animation: fadeIn 0.3s ease; }
        .modal-box { background: white; border-radius: 24px; max-width: 700px; width: 95%; max-height: 85vh; overflow-y: auto; padding: 30px; position: relative; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .dark .modal-box { background: #132424; }
        .modal-close { position: absolute; top: 16px; right: 20px; font-size: 28px; cursor: pointer; color: #999; transition: color 0.2s; }
        .modal-close:hover { color: #333; }
        .dark .modal-close { color: #666; }
        .dark .modal-close:hover { color: #ccc; }
    </style>
</head>
<body>

    <!-- ===== SIDEBAR (Admin) ===== -->
    <aside id="sidebar" class="sidebar-teal fixed inset-y-0 left-0 w-64 shadow-2xl transform -translate-x-full md:translate-x-0 transition-transform duration-300 z-40 flex flex-col">
        <div class="h-16 flex items-center justify-center gap-2 border-b border-white/5 shrink-0">
            <a href="/" class="text-2xl font-extrabold tracking-tight text-white drop-shadow-sm hover:opacity-80 transition">
                Group<span class="text-[#c6f0ee]">Sync</span>
            </a>
            <span class="text-[10px] font-medium tracking-widest uppercase bg-white/10 text-white/50 px-2 py-0.5 rounded-full border border-white/5">Admin</span>
        </div>
        <nav class="flex-1 px-3 py-4 space-y-0.5 sidebar-scroll">
            <a href="#" data-page="dashboard" class="nav-link active"><span class="icon">📊</span> Dashboard</a>
            <a href="#" data-page="users" class="nav-link"><span class="icon">👥</span> Users</a>
            <a href="#" data-page="courses" class="nav-link"><span class="icon">📚</span> Courses</a>
            <a href="#" data-page="logs" class="nav-link"><span class="icon">📋</span> Audit Logs</a>
            <a href="#" data-page="settings" class="nav-link"><span class="icon">⚙️</span> Settings</a>
        </nav>
        <div class="shrink-0 p-4 border-t border-white/5 bg-black/10 backdrop-blur-sm">
            <div class="flex items-center gap-3">
                <div id="user-avatar" class="w-10 h-10 rounded-full bg-gradient-to-br from-[#3AAFA9] to-[#2B7A78] flex items-center justify-center text-white font-semibold text-sm shadow-lg shadow-[#3AAFA9]/20 cursor-pointer hover:scale-105 transition">AD</div>
                <div class="flex-1 min-w-0"><p id="user-name" class="text-sm font-medium text-white truncate">Admin</p><p class="text-xs text-white/40 truncate">Administrator</p></div>
                <button id="logoutBtn" class="logout-btn" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
    </aside>

    <!-- ===== MOBILE MENU ===== -->
    <button id="menuBtn" class="menu-btn fixed top-4 left-4 z-50 md:hidden text-white p-2.5 rounded-xl shadow-lg"><i class="fas fa-bars text-lg"></i></button>

    <!-- ===== HEADER ===== -->
    <header class="header-teal fixed top-0 right-0 left-0 md:left-64 z-30 transition-colors">
        <div class="max-w-full px-4 sm:px-6 lg:px-8 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-sm font-medium text-white/70 hidden sm:block">Admin Dashboard</span>
                <span class="h-4 w-px bg-white/10 hidden sm:block"></span>
                <span id="page-title" class="text-sm font-medium text-white/50">Overview</span>
            </div>
            <div class="flex items-center gap-3">
                <button id="themeToggle" class="theme-toggle"><i id="themeIcon" class="fas fa-sun"></i></button>
            </div>
        </div>
    </header>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="md:ml-64 pt-16 pb-8 px-4 sm:px-6 lg:px-8 min-h-screen">
        <div id="page-content" class="animate-fade-in">
            <!-- content loaded dynamically -->
        </div>
    </main>

    <script>
        // ============================================
        // CONFIGURATION
        // ============================================
        const API_BASE = '/api';
        const STORAGE_KEYS = {
            TOKEN: 'groupsync_auth_token',
            USER: 'groupsync_user_data',
            THEME: 'theme'
        };

        // ============================================
        // DEMO DATA
        // ============================================
        var adminUsers = [
            { id: 1, name: 'John Doe', email: 'john@example.com', role: 'student', status: 'active', joined: '2024-01-15' },
            { id: 2, name: 'Jane Smith', email: 'jane@example.com', role: 'student', status: 'active', joined: '2024-01-20' },
            { id: 3, name: 'Prof. Bob Bobbi', email: 'bob@example.com', role: 'professor', status: 'active', joined: '2023-12-01' },
            { id: 4, name: 'Mike Brown', email: 'mike@example.com', role: 'student', status: 'inactive', joined: '2024-02-10' },
            { id: 5, name: 'Prof. Alice Wonder', email: 'alice@example.com', role: 'professor', status: 'pending', joined: '2024-03-01' }
        ];

        var adminCourses = [
            { id: 1, code: 'CS401', title: 'Software Engineering', teacher: 'Prof. Bob Bobbi', students: 32, status: 'active' },
            { id: 2, code: 'CS402', title: 'Database Systems', teacher: 'Prof. Alice Wonder', students: 28, status: 'active' },
            { id: 3, code: 'CS403', title: 'Web Development', teacher: 'Prof. Bob Bobbi', students: 25, status: 'active' },
            { id: 4, code: 'CS404', title: 'Data Structures', teacher: 'Prof. Alice Wonder', students: 30, status: 'inactive' }
        ];

        var adminLogs = [
            { user: 'John Doe', action: 'Login', details: 'User logged in successfully', time: '2024-06-22 10:30:00' },
            { user: 'Jane Smith', action: 'Submit Peer Review', details: 'Submitted review for Mike Brown', time: '2024-06-22 09:15:00' },
            { user: 'Prof. Bob Bobbi', action: 'Create Course', details: 'Created course CS403', time: '2024-06-21 16:45:00' },
            { user: 'Admin', action: 'User Management', details: 'Added new student account', time: '2024-06-21 14:20:00' },
            { user: 'Mike Brown', action: 'Login', details: 'User logged in from new device', time: '2024-06-21 11:00:00' },
            { user: 'Jane Smith', action: 'Connect GitHub', details: 'Connected repository project-repo', time: '2024-06-20 18:30:00' }
        ];

        // ============================================
        // TOAST SYSTEM
        // ============================================
        class ToastManager {
            constructor() { this.container = null;
                this.init(); }
            init() {
                this.container = document.createElement('div');
                this.container.className = 'fixed bottom-4 right-4 z-50 space-y-2 max-w-sm w-full';
                document.body.appendChild(this.container);
            }
            show(message, type = 'info', duration = 5000) {
                const toast = document.createElement('div');
                const colors = {
                    success: 'bg-[#3AAFA9]/10 border-[#3AAFA9] text-[#2B7A78]',
                    error: 'bg-red-50 border-red-400 text-red-800',
                    warning: 'bg-yellow-50 border-yellow-400 text-yellow-800',
                    info: 'bg-blue-50 border-blue-400 text-blue-800'
                };
                const icons = { success: '✓', error: '✕', warning: '⚠', info: 'ℹ' };
                toast.className =
                    `transform transition-all duration-300 translate-x-full opacity-0 border-l-4 rounded-xl shadow-xl p-4 mb-2 ${colors[type]} dark:bg-[#132424] dark:border-[#3AAFA9] dark:text-[#7ccfca]`;
                toast.innerHTML =
                    `<div class="flex items-center"><span class="text-lg font-bold mr-2">${icons[type]}</span><p class="text-sm font-medium">${message}</p><button class="ml-auto font-bold hover:opacity-70 transition">&times;</button></div>`;
                this.container.appendChild(toast);
                requestAnimationFrame(() => { toast.classList.remove('translate-x-full', 'opacity-0'); });
                toast.querySelector('button').onclick = () => toast.remove();
                setTimeout(() => { if (toast.parentNode) toast.remove(); }, duration);
                return toast;
            }
            success(m) { this.show(m, 'success'); }
            error(m) { this.show(m, 'error'); }
            warning(m) { this.show(m, 'warning'); }
            info(m) { this.show(m, 'info'); }
        }

        // ============================================
        // AUTH SERVICE
        // ============================================
        const AuthService = {
            getToken() { return localStorage.getItem(STORAGE_KEYS.TOKEN); },
            getUser() { const data = localStorage.getItem(STORAGE_KEYS.USER); return data ? JSON.parse(data) : null; },
            isAuthenticated() { return !!this.getToken(); },
            logout() {
                localStorage.removeItem(STORAGE_KEYS.TOKEN);
                localStorage.removeItem(STORAGE_KEYS.USER);
                window.location.href = '/login.html';
            }
        };

        // ============================================
        // GLOBALS
        // ============================================
        window.toast = new ToastManager();
        window.auth = AuthService;
        var charts = {};
        var currentPage = 'dashboard';

        // ============================================
        // HELPERS
        // ============================================
        function getInitials(name) {
            if (!name) return 'AD';
            return name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
        }

        // ============================================
        // MODAL SYSTEM
        // ============================================
        function showModal(title, contentHtml) {
            const oldModal = document.getElementById('dynamicModal');
            if (oldModal) oldModal.remove();
            const modalHtml = `
                <div id="dynamicModal" class="modal-overlay" onclick="if(event.target===this) closeModal()">
                    <div class="modal-box">
                        <span class="modal-close" onclick="closeModal()">&times;</span>
                        <h2 class="text-2xl font-bold text-gray-800 dark:text-gray-100 mb-4">${title}</h2>
                        ${contentHtml}
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
        }

        function closeModal() {
            const modal = document.getElementById('dynamicModal');
            if (modal) modal.remove();
        }

        // ============================================
        // PAGE RENDERERS
        // ============================================

        // ----- DASHBOARD -----
        function renderDashboard() {
            var container = document.getElementById('page-content');
            var user = AuthService.getUser();

            var totalUsers = adminUsers.length;
            var activeUsers = adminUsers.filter(function(u) { return u.status === 'active'; }).length;
            var totalCourses = adminCourses.length;
            var activeCourses = adminCourses.filter(function(c) { return c.status === 'active'; }).length;

            container.innerHTML = `
                <div class="space-y-6 animate-fade-in">
                    <div class="card-glass p-6 text-white bg-gradient-to-r from-[#2B7A78] to-[#3AAFA9] border-none shadow-xl">
                        <h2 class="text-2xl font-bold">Welcome back, ${user?.first_name || 'Admin'}! 👋</h2>
                        <p class="text-white/80 mt-1 text-sm">System Overview & Analytics</p>
                    </div>

                    <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-4">
                        <div class="stat-card" onclick="navigate('users')">
                            <div class="flex items-center justify-between">
                                <div><p class="text-sm text-gray-500 dark:text-gray-400">Total Users</p><p class="text-2xl font-bold text-gray-800 dark:text-gray-100 mt-1">${totalUsers}</p></div>
                                <div class="stat-icon teal-bg"><i class="fas fa-users"></i></div>
                            </div>
                            <p class="text-xs text-gray-400 mt-1">${activeUsers} active</p>
                        </div>
                        <div class="stat-card" onclick="navigate('users')">
                            <div class="flex items-center justify-between">
                                <div><p class="text-sm text-gray-500 dark:text-gray-400">Active Users</p><p class="text-2xl font-bold text-green-600 dark:text-green-400 mt-1">${activeUsers}</p></div>
                                <div class="stat-icon teal-bg"><i class="fas fa-user-check"></i></div>
                            </div>
                            <p class="text-xs text-gray-400 mt-1">${Math.round(activeUsers/totalUsers*100)}% of total</p>
                        </div>
                        <div class="stat-card" onclick="navigate('courses')">
                            <div class="flex items-center justify-between">
                                <div><p class="text-sm text-gray-500 dark:text-gray-400">Total Courses</p><p class="text-2xl font-bold text-gray-800 dark:text-gray-100 mt-1">${totalCourses}</p></div>
                                <div class="stat-icon teal-bg"><i class="fas fa-book"></i></div>
                            </div>
                            <p class="text-xs text-gray-400 mt-1">${activeCourses} active</p>
                        </div>
                        <div class="stat-card">
                            <div class="flex items-center justify-between">
                                <div><p class="text-sm text-gray-500 dark:text-gray-400">System Status</p><p class="text-2xl font-bold text-green-600 dark:text-green-400 mt-1">🟢 Online</p></div>
                                <div class="stat-icon teal-bg"><i class="fas fa-server"></i></div>
                            </div>
                            <p class="text-xs text-gray-400 mt-1">All systems operational</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div class="card-glass p-6">
                            <h3 class="text-lg font-semibold text-gray-800 dark:text-gray-100 mb-4">User Distribution</h3>
                            <canvas id="userChart" height="220"></canvas>
                        </div>
                        <div class="card-glass p-6">
                            <h3 class="text-lg font-semibold text-gray-800 dark:text-gray-100 mb-4">Course Status</h3>
                            <canvas id="courseChart" height="220"></canvas>
                        </div>
                    </div>

                    <div class="card-glass p-0 overflow-hidden">
                        <div class="px-6 py-4 border-b border-gray-100 dark:border-gray-800 flex justify-between items-center">
                            <h3 class="text-lg font-semibold text-gray-800 dark:text-gray-100">Recent Activity</h3>
                            <span class="text-xs text-gray-500 dark:text-gray-400">Last 24 hours</span>
                        </div>
                        <div class="divide-y divide-gray-100 dark:divide-gray-800">
                            ${adminLogs.slice(0, 5).map(function(log) {
                                var icon = log.action === 'Login' ? '🔐' : 
                                          log.action === 'Submit Peer Review' ? '⭐' :
                                          log.action === 'Create Course' ? '📚' :
                                          log.action === 'User Management' ? '👥' :
                                          log.action === 'Connect GitHub' ? '🔗' : '📋';
                                return `<div class="flex items-center p-4 hover:bg-gray-50 dark:hover:bg-gray-800 transition"><div class="w-10 h-10 rounded-full bg-gray-100 dark:bg-gray-700 flex items-center justify-center text-lg">${icon}</div><div class="ml-4 flex-1"><p class="text-sm font-medium text-gray-900 dark:text-gray-100">${log.user}</p><p class="text-xs text-gray-500 dark:text-gray-400">${log.action} - ${log.details}</p></div><div class="text-xs text-gray-400 dark:text-gray-500">${log.time}</div></div>`;
                            }).join('')}
                        </div>
                    </div>
                </div>
            `;

            // Render charts
            setTimeout(function() {
                var ctx1 = document.getElementById('userChart')?.getContext('2d');
                if (ctx1) {
                    if (charts.user) charts.user.destroy();
                    var studentCount = adminUsers.filter(function(u) { return u.role === 'student'; }).length;
                    var professorCount = adminUsers.filter(function(u) { return u.role === 'professor'; }).length;
                    charts.user = new Chart(ctx1, {
                        type: 'doughnut',
                        data: {
                            labels: ['Students', 'Professors'],
                            datasets: [{ data: [studentCount, professorCount], backgroundColor: ['#3b82f6', '#8b5cf6'], borderWidth: 0 }]
                        },
                        options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'bottom' } } }
                    });
                }
                var ctx2 = document.getElementById('courseChart')?.getContext('2d');
                if (ctx2) {
                    if (charts.course) charts.course.destroy();
                    var activeCourses = adminCourses.filter(function(c) { return c.status === 'active'; }).length;
                    var inactiveCourses = adminCourses.filter(function(c) { return c.status === 'inactive'; }).length;
                    charts.course = new Chart(ctx2, {
                        type: 'doughnut',
                        data: { labels: ['Active', 'Inactive'], datasets: [{ data: [activeCourses, inactiveCourses], backgroundColor: ['#10b981', '#ef4444'], borderWidth: 0 }] },
                        options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'bottom' } } }
                    });
                }
            }, 100);
        }

        // ----- USERS -----
        function renderUsers() {
            var container = document.getElementById('page-content');
            container.innerHTML = `
                <div class="space-y-6 animate-fade-in">
                    <div class="flex justify-between items-center">
                        <h2 class="text-2xl font-bold text-gray-800 dark:text-gray-100">👥 User Management</h2>
                        <button onclick="showToast('Add user form coming soon!', 'info')" class="btn-teal"><i class="fas fa-plus mr-2"></i> Add User</button>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-4 gap-4">
                        <div class="stat-card text-center"><p class="text-2xl font-bold text-[#3AAFA9]">${adminUsers.length}</p><p class="text-sm text-gray-500 dark:text-gray-400">Total Users</p></div>
                        <div class="stat-card text-center"><p class="text-2xl font-bold text-green-600 dark:text-green-400">${adminUsers.filter(u => u.status === 'active').length}</p><p class="text-sm text-gray-500 dark:text-gray-400">Active</p></div>
                        <div class="stat-card text-center"><p class="text-2xl font-bold text-yellow-600 dark:text-yellow-400">${adminUsers.filter(u => u.status === 'pending').length}</p><p class="text-sm text-gray-500 dark:text-gray-400">Pending</p></div>
                        <div class="stat-card text-center"><p class="text-2xl font-bold text-red-600 dark:text-red-400">${adminUsers.filter(u => u.status === 'inactive').length}</p><p class="text-sm text-gray-500 dark:text-gray-400">Inactive</p></div>
                    </div>
                    <div class="card-glass p-0 overflow-hidden">
                        <div class="px-6 py-4 border-b border-gray-100 dark:border-gray-800"><h3 class="text-lg font-semibold text-gray-800 dark:text-gray-100">All Users</h3></div>
                        <div class="overflow-x-auto">
                            <table class="w-full">
                                <thead class="bg-gray-50 dark:bg-gray-800">
                                    <tr><th class="px-4 py-2 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase">Name</th><th class="px-4 py-2 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase">Email</th><th class="px-4 py-2 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase">Role</th><th class="px-4 py-2 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase">Status</th><th class="px-4 py-2 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase">Action</th></tr>
                                </thead>
                                <tbody>
                                    ${adminUsers.map(function(u) {
                                        var statusClass = u.status === 'active' ? 'status-active' : u.status === 'pending' ? 'status-pending' : 'status-inactive';
                                        return `<tr class="border-t border-gray-100 dark:border-gray-800 hover:bg-gray-50 dark:hover:bg-gray-800/50"><td class="px-4 py-2 text-sm font-medium text-gray-900 dark:text-gray-100">${u.name}</td><td class="px-4 py-2 text-sm text-gray-600 dark:text-gray-400">${u.email}</td><td class="px-4 py-2 text-sm text-gray-600 dark:text-gray-400">${u.role}</td><td class="px-4 py-2"><span class="px-2 py-0.5 rounded-full text-xs ${statusClass}">${u.status}</span></td><td class="px-4 py-2"><button onclick="showToast('Editing ${u.name}', 'info')" class="text-[#3AAFA9] hover:text-[#2B7A78] text-sm mr-2">✏️</button><button onclick="showToast('Deleting ${u.name}', 'warning')" class="text-red-600 hover:text-red-800 text-sm">🗑️</button></td></tr>`;
                                    }).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
        }

        // ----- COURSES -----
        function renderAdminCourses() {
            var container = document.getElementById('page-content');
            container.innerHTML = `
                <div class="space-y-6 animate-fade-in">
                    <div class="flex justify-between items-center">
                        <h2 class="text-2xl font-bold text-gray-800 dark:text-gray-100">📚 Course Management</h2>
                        <button onclick="showToast('Create course form coming soon!', 'info')" class="btn-teal"><i class="fas fa-plus mr-2"></i> New Course</button>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        ${adminCourses.map(function(c) {
                            var statusColor = c.status === 'active' ? 'status-active' : 'status-inactive';
                            var gradient = c.status === 'active' ? 'from-[#2B7A78] to-[#3AAFA9]' : 'from-gray-500 to-gray-600';
                            return `<div class="card-glass p-0 overflow-hidden"><div class="bg-gradient-to-r ${gradient} px-6 py-4"><h3 class="text-lg font-semibold text-white">${c.code}</h3><p class="text-white/80 text-sm">${c.title}</p></div><div class="p-6"><div class="space-y-2"><div class="flex justify-between"><span class="text-sm text-gray-500 dark:text-gray-400">Teacher</span><span class="font-medium text-gray-800 dark:text-gray-100">${c.teacher}</span></div><div class="flex justify-between"><span class="text-sm text-gray-500 dark:text-gray-400">Students</span><span class="font-medium text-gray-800 dark:text-gray-100">${c.students}</span></div><div class="flex justify-between"><span class="text-sm text-gray-500 dark:text-gray-400">Status</span><span class="px-2 py-0.5 rounded-full text-xs ${statusColor}">${c.status}</span></div></div><button onclick="showToast('Viewing ${c.code}', 'info')" class="mt-4 w-full btn-teal text-sm">View Details</button></div></div>`;
                        }).join('')}
                    </div>
                </div>
            `;
        }

        // ----- LOGS -----
        function renderLogs() {
            var container = document.getElementById('page-content');
            container.innerHTML = `
                <div class="space-y-6 animate-fade-in">
                    <div class="flex justify-between items-center">
                        <h2 class="text-2xl font-bold text-gray-800 dark:text-gray-100">📋 Audit Logs</h2>
                        <button onclick="showToast('Logs exported!', 'success')" class="btn-teal"><i class="fas fa-download mr-2"></i> Export</button>
                    </div>
                    <div class="card-glass p-0 overflow-hidden">
                        <div class="px-6 py-4 border-b border-gray-100 dark:border-gray-800 flex justify-between items-center">
                            <h3 class="text-lg font-semibold text-gray-800 dark:text-gray-100">System Activity Logs</h3>
                            <span class="text-xs text-gray-500 dark:text-gray-400">${adminLogs.length} entries</span>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full">
                                <thead class="bg-gray-50 dark:bg-gray-800">
                                    <tr><th class="px-4 py-2 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase">User</th><th class="px-4 py-2 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase">Action</th><th class="px-4 py-2 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase">Details</th><th class="px-4 py-2 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase">Time</th></tr>
                                </thead>
                                <tbody>
                                    ${adminLogs.map(function(log) {
                                        return `<tr class="border-t border-gray-100 dark:border-gray-800 hover:bg-gray-50 dark:hover:bg-gray-800/50"><td class="px-4 py-2 text-sm font-medium text-gray-900 dark:text-gray-100">${log.user}</td><td class="px-4 py-2"><span class="px-2 py-0.5 bg-gray-100 dark:bg-gray-700 rounded-full text-xs">${log.action}</span></td><td class="px-4 py-2 text-sm text-gray-600 dark:text-gray-400">${log.details}</td><td class="px-4 py-2 text-sm text-gray-500 dark:text-gray-400">${log.time}</td></tr>`;
                                    }).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
        }

        // ----- SETTINGS -----
        function renderSettings() {
            var container = document.getElementById('page-content');
            container.innerHTML = `
                <div class="space-y-6 animate-fade-in">
                    <h2 class="text-2xl font-bold text-gray-800 dark:text-gray-100">⚙️ System Settings</h2>
                    <div class="card-glass p-6">
                        <h3 class="text-lg font-semibold text-gray-800 dark:text-gray-100 mb-4">General Settings</h3>
                        <form onsubmit="saveSettings(event)" class="space-y-4">
                            <div><label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Site Name</label><input type="text" id="siteName" value="GroupSync" class="input-teal mt-1" /></div>
                            <div class="flex items-center"><input type="checkbox" id="emailVerification" checked class="checkbox-teal"><label class="ml-2 text-sm text-gray-700 dark:text-gray-300">Require Email Verification</label></div>
                            <div><label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Session Timeout (minutes)</label><input type="number" id="sessionTimeout" value="30" class="input-teal mt-1" /></div>
                            <div><label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Backup Schedule</label><select id="backupSchedule" class="input-teal mt-1"><option value="Daily">Daily</option><option value="Weekly" selected>Weekly</option><option value="Monthly">Monthly</option></select></div>
                            <button type="submit" class="btn-teal">Save Settings</button>
                        </form>
                    </div>
                    <div class="card-glass p-6">
                        <h3 class="text-lg font-semibold text-gray-800 dark:text-gray-100 mb-4">System Status</h3>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div class="p-4 bg-green-50 dark:bg-green-900/20 rounded-lg border border-green-200 dark:border-green-800"><p class="text-sm text-gray-600 dark:text-gray-400">Database</p><p class="text-lg font-semibold text-green-600 dark:text-green-400">✅ Connected</p></div>
                            <div class="p-4 bg-green-50 dark:bg-green-900/20 rounded-lg border border-green-200 dark:border-green-800"><p class="text-sm text-gray-600 dark:text-gray-400">API Services</p><p class="text-lg font-semibold text-green-600 dark:text-green-400">✅ Operational</p></div>
                            <div class="p-4 bg-yellow-50 dark:bg-yellow-900/20 rounded-lg border border-yellow-200 dark:border-yellow-800"><p class="text-sm text-gray-600 dark:text-gray-400">Last Backup</p><p class="text-lg font-semibold text-yellow-600 dark:text-yellow-400">🕐 2 hours ago</p></div>
                        </div>
                    </div>
                </div>
            `;
        }

        function saveSettings(e) {
            e.preventDefault();
            showToast('Settings saved successfully! ✅', 'success');
        }

        // ============================================
        // NAVIGATION
        // ============================================
        function navigate(page) {
            currentPage = page;
            document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
            document.querySelector(`.nav-link[data-page="${page}"]`)?.classList.add('active');
            const titles = { dashboard: 'Overview', users: 'Users', courses: 'Courses', logs: 'Audit Logs', settings: 'Settings' };
            document.getElementById('page-title').textContent = titles[page] || 'Overview';
            switch (page) {
                case 'dashboard': renderDashboard(); break;
                case 'users': renderUsers(); break;
                case 'courses': renderAdminCourses(); break;
                case 'logs': renderLogs(); break;
                case 'settings': renderSettings(); break;
                default: renderDashboard();
            }
            if (window.innerWidth < 768) document.getElementById('sidebar').classList.add('-translate-x-full');
        }

        // ============================================
        // THEME TOGGLE
        // ============================================
        (function initTheme() {
            const toggle = document.getElementById('themeToggle');
            const icon = document.getElementById('themeIcon');
            const html = document.documentElement;
            const saved = localStorage.getItem(STORAGE_KEYS.THEME);
            if (saved === 'dark') {
                html.classList.add('dark');
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
            }
            toggle.addEventListener('click', function() {
                const isDark = html.classList.toggle('dark');
                if (isDark) { icon.classList.remove('fa-sun');
                    icon.classList.add('fa-moon');
                    localStorage.setItem(STORAGE_KEYS.THEME, 'dark'); } else { icon.classList.remove('fa-moon');
                    icon.classList.add('fa-sun');
                    localStorage.setItem(STORAGE_KEYS.THEME, 'light'); }
            });
        })();

        // ============================================
        // INITIALIZATION
        // ============================================
        function init() {
            if (!AuthService.isAuthenticated()) {
                window.location.href = '/login.html';
                return;
            }
            var user = AuthService.getUser();
            if (user) {
                document.getElementById('user-name').textContent = (user.first_name || 'Admin') + ' ' + (user.last_name || '');
                document.getElementById('user-avatar').textContent = getInitials((user.first_name || 'A') + ' ' + (user.last_name || 'D'));
            }
            document.getElementById('menuBtn')?.addEventListener('click', function() {
                document.getElementById('sidebar').classList.toggle('-translate-x-full');
            });
            document.querySelectorAll('.nav-link').forEach(function(link) {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    var page = this.dataset.page;
                    if (window.innerWidth < 768) document.getElementById('sidebar').classList.add('-translate-x-full');
                    navigate(page);
                });
            });
            document.getElementById('logoutBtn')?.addEventListener('click', function() { AuthService.logout(); });
            navigate('dashboard');
        }
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
