<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professor Dashboard - GroupSync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        .sidebar-transition { transition: transform 0.3s ease-in-out; }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        .nav-link.active { background-color: #eff6ff; color: #1d4ed8; }
        .nav-link { cursor: pointer; transition: all 0.2s ease; }
        .nav-link:hover { background-color: #f3f4f6; }
        .animate-spin { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .modal-overlay { 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.5); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 999; 
        }
        .modal-box {
            background: white;
            border-radius: 12px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 30px;
            position: relative;
            animation: modalFade 0.3s ease;
        }
        @keyframes modalFade {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            color: #999;
            transition: color 0.2s;
        }
        .modal-close:hover { color: #333; }
        .edit-input { width: 100%; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; }
        .edit-input:focus { outline: none; border-color: #3b82f6; ring: 2px solid #3b82f6; }
        .empty-state { text-align: center; padding: 40px 20px; }
        .empty-state .icon { font-size: 64px; margin-bottom: 16px; }
        .empty-state h3 { font-size: 20px; font-weight: 600; color: #1f2937; margin-bottom: 8px; }
        .empty-state p { color: #6b7280; font-size: 14px; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="app">
        <!-- Sidebar -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-white shadow-lg transform -translate-x-full md:translate-x-0 transition-transform duration-300 z-30">
            <div class="h-16 bg-gradient-to-r from-blue-600 to-blue-700 flex items-center justify-center">
                <h1 class="text-xl font-bold text-white">GroupSync</h1>
                <span class="ml-2 text-xs text-blue-200">Professor</span>
            </div>
            <nav class="p-4 space-y-1">
                <a href="#" onclick="showPage('dashboard')" class="nav-link active flex items-center px-3 py-2 rounded-lg" data-page="dashboard">
                    <span class="text-xl mr-3">📊</span><span>Dashboard</span>
                </a>
                <a href="#" onclick="showPage('courses')" class="nav-link flex items-center px-3 py-2 rounded-lg" data-page="courses">
                    <span class="text-xl mr-3">📚</span><span>Course Management</span>
                </a>
                <a href="#" onclick="showPage('analytics')" class="nav-link flex items-center px-3 py-2 rounded-lg" data-page="analytics">
                    <span class="text-xl mr-3">📈</span><span>Group Analytics</span>
                </a>
                <a href="#" onclick="showPage('evaluation')" class="nav-link flex items-center px-3 py-2 rounded-lg" data-page="evaluation">
                    <span class="text-xl mr-3">🎓</span><span>Student Evaluation</span>
                </a>
                <a href="#" onclick="showPage('reports')" class="nav-link flex items-center px-3 py-2 rounded-lg" data-page="reports">
                    <span class="text-xl mr-3">📄</span><span>PDF Reports</span>
                </a>
            </nav>
            <div class="absolute bottom-0 w-full p-4 border-t bg-gray-50">
                <div class="flex items-center">
                    <div id="user-avatar" class="w-10 h-10 bg-gradient-to-r from-blue-400 to-blue-600 rounded-full flex items-center justify-center text-white font-semibold text-lg">PR</div>
                    <div class="ml-3 flex-1">
                        <p id="user-name" class="text-sm font-medium text-gray-800">Professor</p>
                        <p class="text-xs text-gray-500">Professor</p>
                    </div>
                    <button onclick="logoutUser()" class="p-2 text-red-500 hover:text-red-700 transition" title="Logout">🚪</button>
                </div>
            </div>
        </aside>

        <!-- Mobile Menu Button -->
        <button id="menuBtn" class="fixed top-4 left-4 z-40 md:hidden bg-blue-600 text-white p-2 rounded-lg shadow-lg">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
        </button>

        <!-- Main Content -->
        <main class="md:ml-64 p-6">
            <div id="page-content">
                <!-- Pages will be loaded here -->
            </div>
        </main>
    </div>

    <script>
        // ============================================
        // CONFIGURATION
        // ============================================
        var STORAGE_KEYS = {
            TOKEN: 'groupsync_auth_token',
            USER: 'groupsync_user_data'
        };

        // ============================================
        // AUTH SERVICE
        // ============================================
        function getToken() { return localStorage.getItem(STORAGE_KEYS.TOKEN); }
        function getUser() { var data = localStorage.getItem(STORAGE_KEYS.USER); return data ? JSON.parse(data) : null; }
        function isAuthenticated() { return !!getToken(); }

        function logoutUser() {
            localStorage.removeItem(STORAGE_KEYS.TOKEN);
            localStorage.removeItem(STORAGE_KEYS.USER);
            window.location.href = '/login.html';
        }

        // ============================================
        // TOAST SYSTEM
        // ============================================
        function showToast(message, type) {
            type = type || 'info';
            var colors = {
                success: 'bg-green-50 border-green-400 text-green-800',
                error: 'bg-red-50 border-red-400 text-red-800',
                warning: 'bg-yellow-50 border-yellow-400 text-yellow-800',
                info: 'bg-blue-50 border-blue-400 text-blue-800'
            };
            var icons = { success: '✓', error: '✕', warning: '⚠', info: 'ℹ' };
            
            var container = document.getElementById('toast-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toast-container';
                container.className = 'fixed bottom-4 right-4 z-50 space-y-2';
                document.body.appendChild(container);
            }
            
            var toast = document.createElement('div');
            toast.className = 'transform transition-all duration-300 translate-x-full opacity-0 border-l-4 rounded-lg shadow-lg p-4 mb-2 max-w-md ' + colors[type];
            toast.innerHTML = '<div class="flex items-center"><span class="text-lg font-bold mr-2">' + icons[type] + '</span><p class="text-sm flex-1">' + message + '</p><button class="ml-2 text-gray-400 hover:text-gray-600" onclick="this.parentElement.parentElement.remove()">&times;</button></div>';
            container.appendChild(toast);
            setTimeout(function() { toast.classList.add('translate-x-0', 'opacity-100'); }, 10);
            setTimeout(function() { if(toast.parentNode) toast.remove(); }, 5000);
        }

        // ============================================
        // DATA STORE (Professor-specific)
        // ============================================
        var professorData = {
            courses: [],
            students: [],
            groups: [],
            alerts: []
        };

        function getProfessorId() {
            var user = getUser();
            return user ? user.id : 'default';
        }

        function loadProfessorData() {
            var profId = getProfessorId();
            var key = 'professor_data_' + profId;
            var stored = localStorage.getItem(key);
            
            if (stored) {
                try {
                    var parsed = JSON.parse(stored);
                    professorData.courses = parsed.courses || [];
                    professorData.students = parsed.students || [];
                    professorData.groups = parsed.groups || [];
                    professorData.alerts = parsed.alerts || [];
                } catch(e) {
                    console.error('Error loading data:', e);
                }
            } else {
                professorData.courses = [];
                professorData.students = [];
                professorData.groups = [];
                professorData.alerts = [];
                saveProfessorData();
            }
        }

        function saveProfessorData() {
            var profId = getProfessorId();
            var key = 'professor_data_' + profId;
            localStorage.setItem(key, JSON.stringify({
                courses: professorData.courses,
                students: professorData.students,
                groups: professorData.groups,
                alerts: professorData.alerts
            }));
        }

        // ============================================
        // CHART VARIABLES
        // ============================================
        var charts = {};

        // ============================================
        // COURSE DETAILS MODAL
        // ============================================
        var currentEditingCourseId = null;

        function showCourseDetails(courseId) {
            var course = professorData.courses.find(function(c) { return c.id === courseId; });
            if (!course) {
                showToast('Course not found', 'error');
                return;
            }

            var courseStudents = professorData.students.slice(0, course.students_count || 3);
            
            var modalHTML = `
                <div class="modal-overlay" id="courseModal" onclick="if(event.target===this) closeModal()">
                    <div class="modal-box">
                        <span class="modal-close" onclick="closeModal()">&times;</span>
                        
                        <div class="flex items-center justify-between mb-4">
                            <div>
                                <h2 class="text-2xl font-bold text-gray-900">${course.code}</h2>
                                <p class="text-gray-600">${course.title}</p>
                            </div>
                            <span class="px-3 py-1 rounded-full text-sm font-medium ${course.is_active ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-800'}">
                                ${course.is_active ? '✅ Active' : '❌ Inactive'}
                            </span>
                        </div>

                        <div class="bg-gray-50 rounded-lg p-4 mb-4">
                            <p class="text-gray-700">${course.description || 'No description available.'}</p>
                        </div>

                        <div class="grid grid-cols-2 gap-4 mb-4">
                            <div class="bg-blue-50 rounded-lg p-3 text-center">
                                <p class="text-2xl font-bold text-blue-600">${course.semester}</p>
                                <p class="text-xs text-gray-500">Semester</p>
                            </div>
                            <div class="bg-green-50 rounded-lg p-3 text-center">
                                <p class="text-2xl font-bold text-green-600">${course.students_count}</p>
                                <p class="text-xs text-gray-500">Total Students</p>
                            </div>
                            <div class="bg-purple-50 rounded-lg p-3 text-center">
                                <p class="text-2xl font-bold text-purple-600">${course.groups_count}</p>
                                <p class="text-xs text-gray-500">Total Groups</p>
                            </div>
                            <div class="bg-yellow-50 rounded-lg p-3 text-center">
                                <p class="text-2xl font-bold text-yellow-600">${Math.round(course.students_count / (course.groups_count || 1))}</p>
                                <p class="text-xs text-gray-500">Avg Group Size</p>
                            </div>
                        </div>

                        <h4 class="font-semibold text-gray-800 mb-3">Students Enrolled</h4>
                        <div class="max-h-40 overflow-y-auto">
                            ${courseStudents.length > 0 ? courseStudents.map(function(s) {
                                var badgeClass = s.classification === 'Active' ? 'bg-green-100 text-green-800' :
                                                s.classification === 'Moderate' ? 'bg-yellow-100 text-yellow-800' :
                                                s.classification === 'Passive' ? 'bg-orange-100 text-orange-800' :
                                                'bg-red-100 text-red-800';
                                return '<div class="flex items-center justify-between py-2 border-b border-gray-100"><span class="text-sm">' + s.name + '</span><span class="px-2 py-0.5 rounded-full text-xs ' + badgeClass + '">' + s.classification + '</span></div>';
                            }).join('') : '<p class="text-gray-500 text-sm">No students enrolled yet.</p>'}
                        </div>

                        <div class="mt-4 flex space-x-3">
                            <button onclick="closeModal(); openEditCourse(${course.id})" class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
                                ✏️ Edit Course
                            </button>
                            <button onclick="closeModal(); generateCourseReportById(${course.id})" class="flex-1 px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">
                                📄 Generate Report
                            </button>
                            <button onclick="closeModal()" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">
                                Close
                            </button>
                        </div>
                    </div>
                </div>
            `;

            var existingModal = document.getElementById('courseModal');
            if (existingModal) existingModal.remove();
            document.body.insertAdjacentHTML('beforeend', modalHTML);
        }

        function closeModal() {
            var modal = document.getElementById('courseModal');
            if (modal) modal.remove();
            var editModal = document.getElementById('editCourseModal');
            if (editModal) editModal.remove();
        }

        // ============================================
        // EDIT COURSE FUNCTION
        // ============================================
        function openEditCourse(courseId) {
            var course = professorData.courses.find(function(c) { return c.id === courseId; });
            if (!course) {
                showToast('Course not found', 'error');
                return;
            }
            currentEditingCourseId = courseId;

            var editHTML = `
                <div class="modal-overlay" id="editCourseModal" onclick="if(event.target===this) closeEditModal()">
                    <div class="modal-box">
                        <span class="modal-close" onclick="closeEditModal()">&times;</span>
                        <h2 class="text-2xl font-bold text-gray-900 mb-4">✏️ Edit Course: ${course.code}</h2>
                        
                        <form id="editCourseForm" onsubmit="saveCourseChanges(event)">
                            <div class="space-y-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700">Course Code</label>
                                    <input type="text" id="editCode" value="${course.code}" class="edit-input" required>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700">Course Title</label>
                                    <input type="text" id="editTitle" value="${course.title}" class="edit-input" required>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700">Semester</label>
                                    <select id="editSemester" class="edit-input">
                                        <option value="Fall 2024" ${course.semester === 'Fall 2024' ? 'selected' : ''}>Fall 2024</option>
                                        <option value="Spring 2025" ${course.semester === 'Spring 2025' ? 'selected' : ''}>Spring 2025</option>
                                        <option value="Summer 2025" ${course.semester === 'Summer 2025' ? 'selected' : ''}>Summer 2025</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700">Description</label>
                                    <textarea id="editDescription" rows="3" class="edit-input">${course.description || ''}</textarea>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700">Status</label>
                                    <select id="editStatus" class="edit-input">
                                        <option value="true" ${course.is_active ? 'selected' : ''}>Active</option>
                                        <option value="false" ${!course.is_active ? 'selected' : ''}>Inactive</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700">Students Count</label>
                                    <input type="number" id="editStudents" value="${course.students_count}" class="edit-input" min="0">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700">Groups Count</label>
                                    <input type="number" id="editGroups" value="${course.groups_count}" class="edit-input" min="0">
                                </div>
                            </div>
                            <div class="mt-6 flex space-x-3">
                                <button type="submit" class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">💾 Save Changes</button>
                                <button type="button" onclick="closeEditModal()" class="flex-1 px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">Cancel</button>
                            </div>
                        </form>
                    </div>
                </div>
            `;

            var existingEditModal = document.getElementById('editCourseModal');
            if (existingEditModal) existingEditModal.remove();
            document.body.insertAdjacentHTML('beforeend', editHTML);
        }

        function closeEditModal() {
            var modal = document.getElementById('editCourseModal');
            if (modal) modal.remove();
        }

        function saveCourseChanges(e) {
            e.preventDefault();
            var course = professorData.courses.find(function(c) { return c.id === currentEditingCourseId; });
            if (!course) {
                showToast('Course not found', 'error');
                return;
            }

            course.code = document.getElementById('editCode').value;
            course.title = document.getElementById('editTitle').value;
            course.semester = document.getElementById('editSemester').value;
            course.description = document.getElementById('editDescription').value;
            course.is_active = document.getElementById('editStatus').value === 'true';
            course.students_count = parseInt(document.getElementById('editStudents').value) || 0;
            course.groups_count = parseInt(document.getElementById('editGroups').value) || 0;

            closeEditModal();
            saveProfessorData();
            showToast('✅ Course ' + course.code + ' updated successfully!', 'success');
            var currentPage = document.querySelector('.nav-link.active')?.dataset?.page || 'courses';
            showPage(currentPage);
        }

        // ============================================
        // GENERATE REPORT FUNCTION
        // ============================================
        function generateCourseReportById(courseId) {
            var course = professorData.courses.find(function(c) { return c.id === courseId; });
            if (!course) {
                showToast('❌ Course not found!', 'error');
                return;
            }

            showToast('📄 Generating report for ' + course.code + '...', 'info');
            
            var reportContent = 
                '============================================\n' +
                '      GROUPSYNC - COURSE REPORT            \n' +
                '============================================\n\n' +
                'Course Code: ' + course.code + '\n' +
                'Course Title: ' + course.title + '\n' +
                'Semester: ' + course.semester + '\n' +
                'Status: ' + (course.is_active ? 'Active ✅' : 'Inactive ❌') + '\n\n' +
                '----------------------------\n' +
                '     STATISTICS\n' +
                '----------------------------\n' +
                'Total Students: ' + course.students_count + '\n' +
                'Total Groups: ' + course.groups_count + '\n' +
                'Average Group Size: ' + Math.round(course.students_count / (course.groups_count || 1)) + '\n\n' +
                '----------------------------\n' +
                '     DESCRIPTION\n' +
                '----------------------------\n' +
                (course.description || 'No description available.') + '\n\n' +
                '----------------------------\n' +
                '     GENERATED\n' +
                '----------------------------\n' +
                'Date: ' + new Date().toLocaleDateString() + '\n' +
                'Time: ' + new Date().toLocaleTimeString() + '\n' +
                '============================================\n';
            
            try {
                var blob = new Blob([reportContent], { type: 'text/plain;charset=utf-8' });
                var url = URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.href = url;
                a.download = course.code + '_Report_' + new Date().toISOString().slice(0,10) + '.txt';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
                showToast('✅ Report for ' + course.code + ' downloaded successfully!', 'success');
            } catch (error) {
                showToast('❌ Error generating report. Please try again.', 'error');
            }
        }

        // ============================================
        // COURSE MANAGEMENT FUNCTIONS
        // ============================================

        function showCreateCourseModal() {
            var modal = document.getElementById('createCourseModal');
            if (modal) {
                modal.classList.remove('hidden');
            } else {
                renderCourses();
                setTimeout(function() {
                    var modal2 = document.getElementById('createCourseModal');
                    if (modal2) modal2.classList.remove('hidden');
                }, 100);
            }
        }

        function closeCreateCourseModal() {
            var modal = document.getElementById('createCourseModal');
            if (modal) {
                modal.classList.add('hidden');
            }
        }

        function createCourse(e) {
            e.preventDefault();
            var code = document.getElementById('courseCode').value.trim();
            var title = document.getElementById('courseTitle').value.trim();
            var semester = document.getElementById('courseSemester').value;
            var description = document.getElementById('courseDescription').value.trim();
            
            if (!code || !title) {
                showToast('Please fill in all required fields', 'warning');
                return;
            }
            
            var exists = professorData.courses.some(function(c) { return c.code === code; });
            if (exists) {
                showToast('Course code "' + code + '" already exists!', 'error');
                return;
            }
            
            professorData.courses.push({
                id: Date.now(),
                code: code,
                title: title,
                semester: semester,
                description: description || 'No description provided.',
                students_count: 0,
                groups_count: 0,
                is_active: true
            });
            
            saveProfessorData();
            closeCreateCourseModal();
            
            document.getElementById('courseCode').value = '';
            document.getElementById('courseTitle').value = '';
            document.getElementById('courseDescription').value = '';
            
            showToast('Course ' + code + ' created successfully! ✅', 'success');
            renderCourses();
        }

        function renderCourses() {
            var container = document.getElementById('page-content');
            
            if (professorData.courses.length === 0) {
                container.innerHTML = `
                    <div class="space-y-6 animate-fade-in">
                        <div class="flex justify-between items-center">
                            <h2 class="text-2xl font-bold text-gray-800">📚 Course Management</h2>
                            <button onclick="showCreateCourseModal()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
                                + New Course
                            </button>
                        </div>
                        <div class="bg-white rounded-lg shadow p-12 text-center">
                            <div class="text-6xl mb-4">📖</div>
                            <h3 class="text-2xl font-semibold text-gray-800">No Courses Created</h3>
                            <p class="text-gray-500 mt-2">Create your first course to get started with GroupSync.</p>
                            <button onclick="showCreateCourseModal()" class="mt-4 px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
                                + Create Course
                            </button>
                        </div>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <div class="space-y-6 animate-fade-in">
                    <div class="flex justify-between items-center">
                        <h2 class="text-2xl font-bold text-gray-800">📚 Course Management</h2>
                        <button onclick="showCreateCourseModal()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
                            + New Course
                        </button>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        ${professorData.courses.map(function(course) {
                            var statusColor = course.is_active ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-800';
                            var statusText = course.is_active ? 'Active' : 'Inactive';
                            var gradient = course.is_active ? 'from-blue-500 to-blue-600' : 'from-gray-400 to-gray-500';
                            return `
                                <div class="bg-white rounded-lg shadow overflow-hidden card-hover">
                                    <div class="bg-gradient-to-r ${gradient} px-6 py-4">
                                        <h3 class="text-lg font-semibold text-white">${course.code}</h3>
                                        <p class="text-blue-100 text-sm">${course.title}</p>
                                    </div>
                                    <div class="p-6">
                                        <div class="space-y-2">
                                            <div class="flex justify-between"><span class="text-sm text-gray-600">Semester</span><span class="font-medium">${course.semester}</span></div>
                                            <div class="flex justify-between"><span class="text-sm text-gray-600">Students</span><span class="font-medium">${course.students_count || 0}</span></div>
                                            <div class="flex justify-between"><span class="text-sm text-gray-600">Groups</span><span class="font-medium">${course.groups_count || 0}</span></div>

            var course = professorData.courses.find(function(c) { return c.id == courseId; });
            showToast('Generating report for ' + course.code + '...', 'info');
            setTimeout(function() {
                addRecentReport('Course Report', course.code);
                showToast('✅ Course report generated successfully!', 'success');
            }, 1500);
        }

        function addRecentReport(type, name) {
            recentReports.unshift({
                type: type,
                name: name,
                time: new Date().toLocaleString()
            });
            updateRecentReports();
        }

        function updateRecentReports() {
            var container = document.getElementById('recentReports');
            if (recentReports.length === 0) {
                container.innerHTML = '<div class="p-6 text-center text-gray-500">No reports generated yet</div>';
                return;
            }
            container.innerHTML = recentReports.map(function(r) {
                return '<div class="flex items-center justify-between p-4 hover:bg-gray-50"><div><p class="text-sm font-medium text-gray-900">' + r.type + ': ' + r.name + '</p><p class="text-xs text-gray-500">Generated ' + r.time + '</p></div><button onclick="showToast(\'Downloading ' + r.type + '\', \'info\')" class="text-blue-600 hover:text-blue-800 text-sm font-medium">Download</button></div>';
            }).join('');
        }

        // ============================================
        // PAGE NAVIGATION
        // ============================================
        function showPage(page) {
            var links = document.querySelectorAll('.nav-link');
            for (var i = 0; i < links.length; i++) {
                links[i].classList.remove('active');
            }
            var activeLink = document.querySelector('.nav-link[data-page="' + page + '"]');
            if (activeLink) activeLink.classList.add('active');

            switch(page) {
                case 'dashboard': renderDashboard(); break;
                case 'courses': renderCourses(); break;
                case 'analytics': renderGroupAnalytics(); break;
                case 'evaluation': renderEvaluation(); break;
                case 'reports': renderReports(); break;
                default: renderDashboard();
            }

            if (window.innerWidth < 768) {
                document.getElementById('sidebar').classList.add('-translate-x-full');
            }
        }

        // ============================================
        // INITIALIZATION
        // ============================================
        function init() {
            if (!isAuthenticated()) {
                window.location.href = '/login.html';
                return;
            }

            var user = getUser();
            if (user) {
                document.getElementById('user-name').textContent = 'Prof. ' + (user.first_name || 'Professor') + ' ' + (user.last_name || '');
                var initials = ((user.first_name || 'P')[0] + (user.last_name || 'R')[0]).toUpperCase();
                document.getElementById('user-avatar').textContent = initials;
            }

            loadProfessorData();

            document.getElementById('menuBtn')?.addEventListener('click', function() {
                document.getElementById('sidebar').classList.toggle('-translate-x-full');
            });

            document.addEventListener('click', function(e) {
                var sidebar = document.getElementById('sidebar');
                var menuBtn = document.getElementById('menuBtn');
                if (window.innerWidth < 768 && sidebar && !sidebar.contains(e.target) && !menuBtn.contains(e.target)) {
                    sidebar.classList.add('-translate-x-full');
                }
            });

            renderDashboard();
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
